async function runInference() {
    const text = inferText.value.trim();
    if (!text) return;

    inferRun.disabled = true;
    inferRun.textContent = "Running...";
    inferTokensEl.innerHTML = '<span style="color:var(--text-muted);font-family:var(--font);font-size:12px">Analyzing...</span>';

    try {
        const resp = await fetch("/api/infer", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({text}),
        });
        const data = await resp.json();
        if (data.error) {
            inferTokensEl.innerHTML = `<span style="color:#c00;font-family:var(--font);font-size:12px">${escapeHtml(data.error)}</span>`;
            return;
        }
        inferData = data.tokens;
        renderInferTokens();
    } catch (e) {
        inferTokensEl.innerHTML = `<span style="color:#c00;font-family:var(--font);font-size:12px">Error: ${e.message}</span>`;
    } finally {
        inferRun.disabled = false;
        inferRun.textContent = "Run";
    }
}

async function runCombinedInference() {
    const text = inferText.value.trim();
    if (!text) return;

    inferCombined.disabled = true;
    inferCombined.textContent = "Running...";
    inferTokensEl.innerHTML = '<span style="color:var(--text-muted);font-family:var(--font);font-size:12px">Analyzing combined features...</span>';

    try {
        const resp = await fetch("/api/infer", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({text}),
        });
        const data = await resp.json();
        if (data.error) {
            inferTokensEl.innerHTML = `<span style="color:#c00;font-family:var(--font);font-size:12px">${escapeHtml(data.error)}</span>`;
            return;
        }

        // Aggregate features across ALL tokens
        const featureMap = new Map(); // feature_id -> {total_act, count, max_act, x, y}
        for (const tok of data.tokens) {
            for (const f of tok.top_features) {
                if (featureMap.has(f.feature)) {
                    const entry = featureMap.get(f.feature);
                    entry.total_act += f.activation;
                    entry.max_act = Math.max(entry.max_act, f.activation);
                    entry.count += 1;
                } else {
                    featureMap.set(f.feature, {
                        feature: f.feature,
                        total_act: f.activation,
                        max_act: f.activation,
                        count: 1,
                        x: f.x, y: f.y,
                    });
                }
            }
        }

        // Sort by total activation, take top features
        const combined = [...featureMap.values()]
            .sort((a, b) => b.total_act - a.total_act);
        const topN = combined.slice(0, 30);

        // Highlight all combined features on UMAP
        closeInferPopup();
        inferHighlightSet = new Set(topN.map(f => f.feature));
        selectedIdx = null;
        neighborData = null;
        draw();

        // Show in sidebar
        sidebar.classList.remove("collapsed");
        const nTokens = data.tokens.length;
        const nFeatures = combined.length;

        // Fetch top_tokens for top 15 features
        const fetches = topN.slice(0, 15).map(f =>
            fetch(`/api/top_tokens/${f.feature}`).then(r => r.json()).catch(() => ({tokens: []}))
        );
        const topTokenResults = await Promise.all(fetches);

        const maxTotal = topN.length > 0 ? topN[0].total_act : 1;
        let html = `<div class="feature-title">Combined Features</div>`;
        html += `<div style="font-size:12px;color:var(--text-secondary);margin-bottom:16px">${nTokens} tokens, ${nFeatures} unique features activated</div>`;

        html += `<div class="examples-header">Top Features (by total activation)</div>`;
        for (let fi = 0; fi < topN.length; fi++) {
            const f = topN[fi];
            const pct = (f.total_act / maxTotal * 100).toFixed(0);
            const topToks = fi < 15 ? (topTokenResults[fi]?.tokens || []) : [];

            html += `<div style="margin-bottom:12px;padding:10px 12px;background:var(--hover-bg);border-radius:8px;border-left:3px solid rgba(139,157,131,${f.total_act / maxTotal})">`;
            html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer" class="token-feat-header" data-idx="${f.feature}">`;
            html += `<span style="font-family:var(--mono);font-weight:600;color:var(--accent)">#${f.feature}${interpTag(f.feature)}</span>`;
            html += `<div style="flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden"><div style="height:100%;background:var(--accent);border-radius:2px;width:${pct}%"></div></div>`;
            html += `<span style="font-family:var(--mono);font-size:11px;color:var(--text-muted)" title="total: ${f.total_act.toFixed(3)}, max: ${f.max_act.toFixed(3)}, ${f.count} tokens">${f.total_act.toFixed(2)} <span style="font-size:9px;opacity:0.6">(${f.count}tok)</span></span>`;
            html += `</div>`;

            if (topToks.length > 0) {
                html += `<div style="display:flex;flex-wrap:wrap;gap:3px">`;
                for (const t of topToks.slice(0, 12)) {
                    const text = displayToken(t.text);
                    html += `<span style="display:inline-block;background:rgba(139,157,131,${Math.min(0.5, t.mean_act * 0.25)});border:1px solid rgba(139,157,131,0.2);border-radius:3px;padding:1px 5px;font-family:var(--mono);font-size:10px;white-space:pre" title="count: ${t.count}, mean act: ${t.mean_act.toFixed(3)}">${escapeHtml(text)}<span style="font-size:8px;opacity:0.5;margin-left:2px">${t.count}</span></span>`;
                }
                html += `</div>`;
            }
            html += `</div>`;
        }

        sidebarBody.innerHTML = html;

        // Stash combined view state so we can return to it
        const combinedHighlightSet = new Set(inferHighlightSet);
        function attachCombinedHandlers() {
            for (const el of sidebarBody.querySelectorAll(".token-feat-header")) {
                el.addEventListener("click", async () => {
                    const featIdx = parseInt(el.dataset.idx);
                    // Stash current combined state before navigating away
                    _combinedViewState = {
                        html: sidebarBody.innerHTML,
                        highlightSet: combinedHighlightSet,
                        reattach: attachCombinedHandlers,
                    };
                    selectedIdx = featIdx;
                    inferHighlightSet = null;
                    draw();
                    await showFeature(featIdx);
                });
            }
        }
        attachCombinedHandlers();

        // Also show tokens below with per-token rendering
        inferData = data.tokens;
        renderInferTokens();

    } catch (e) {
        inferTokensEl.innerHTML = `<span style="color:#c00;font-family:var(--font);font-size:12px">Error: ${e.message}</span>`;
    } finally {
        inferCombined.disabled = false;
        inferCombined.textContent = "Combined";
    }
}

let activeInferTok = null; // Currently clicked inference token
let _combinedViewState = null; // Stashed combined sidebar HTML + highlight set

function renderInferTokens() {
    inferTokensEl.innerHTML = "";
    if (!inferData) return;

    for (const tok of inferData) {
        const span = document.createElement("span");
        span.className = "infer-tok";
        span.textContent = tok.token;
        span.dataset.pos = tok.idx;

        // Color intensity by max activation
        const maxAct = tok.top_features.length > 0 ? tok.top_features[0].activation : 0;
        const intensity = Math.min(0.4, maxAct * 0.15);
        span.style.background = `rgba(139, 157, 131, ${intensity})`;

        span.addEventListener("mouseenter", () => {
            hoverHighlightSet = new Set(tok.top_features.map(f => f.feature));
            draw();
        });
        span.addEventListener("mouseleave", () => {
            hoverHighlightSet = null;
            draw();
        });
        span.addEventListener("click", (e) => {
            e.stopPropagation();
            hoverHighlightSet = null;
            toggleTokenPopup(tok, e.target);
        });
        inferTokensEl.appendChild(span);
    }
}

function toggleTokenPopup(tok, spanEl) {
    // If clicking the same token, close it
    if (activeInferTok === tok.idx) {
        closeInferPopup();
        return;
    }

    activeInferTok = tok.idx;

    // Highlight features on UMAP
    inferHighlightSet = new Set(tok.top_features.map(f => f.feature));
    draw();

    // Mark active token
    inferTokensEl.querySelectorAll(".infer-tok").forEach(el => el.classList.remove("active"));
    spanEl.classList.add("active");

    // Position popup
    const rect = spanEl.getBoundingClientRect();
    inferPopup.style.display = "block";
    inferPopup.style.left = Math.min(rect.left, window.innerWidth - 300) + "px";
    inferPopup.style.top = (rect.bottom + 6) + "px";

    // Build popup content
    const maxVal = tok.top_features.length > 0 ? tok.top_features[0].activation : 1;
    let html = `<div class="popup-header">"${escapeHtml(tok.token)}" — top features</div>`;
    for (const f of tok.top_features) {
        const pct = (f.activation / maxVal * 100).toFixed(0);
        html += `<div class="popup-feat" data-feat="${f.feature}">
            <span class="pf-idx">#${f.feature}${interpTag(f.feature)}</span>
            <div class="pf-bar"><div class="pf-bar-fill" style="width:${pct}%"></div></div>
            <span class="pf-val">${f.activation.toFixed(3)}</span>
        </div>`;
    }
    if (tok.top_features.length === 0) {
        html += '<div style="color:var(--text-muted);font-size:12px;padding:4px">No features fired</div>';
    }
    html += `<div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px">
        <button class="popup-sidebar-btn" style="width:100%;padding:6px;background:var(--accent);color:white;border:none;border-radius:6px;font-size:12px;cursor:pointer">Show details + similar tokens</button>
    </div>`;
    inferPopup.innerHTML = html;

    // Click feature in popup -> open feature detail in sidebar (keep popup open)
    inferPopup.querySelectorAll(".popup-feat").forEach(el => {
        el.addEventListener("click", async (ev) => {
            ev.stopPropagation();
            const featIdx = parseInt(el.dataset.feat);
            selectedIdx = featIdx;
            draw();
            await showFeature(featIdx);
        });
    });

    // "Show details" button -> open sidebar with full info (keep popup open)
    inferPopup.querySelector(".popup-sidebar-btn").addEventListener("click", (ev) => {
        ev.stopPropagation();
        showTokenInSidebar(tok);
    });
}

function closeInferPopup() {
    activeInferTok = null;
    inferPopup.style.display = "none";
    inferHighlightSet = null;
    inferTokensEl.querySelectorAll(".infer-tok").forEach(el => el.classList.remove("active"));
    draw();
}

// Close popup when clicking outside
document.addEventListener("click", (e) => {
    if (activeInferTok !== null && !inferPopup.contains(e.target) && !e.target.classList.contains("infer-tok")) {
        closeInferPopup();
    }
});

async function showTokenInSidebar(tok) {
    // Close popup, keep highlights
    inferPopup.style.display = "none";
    activeInferTok = tok.idx; // Keep token visually active
    inferHighlightSet = new Set(tok.top_features.map(f => f.feature));
    selectedIdx = null;
    neighborData = null;
    draw();

    // Mark clicked token
    inferTokensEl.querySelectorAll(".infer-tok").forEach(el => el.classList.remove("active"));
    const clickedSpan = inferTokensEl.querySelector(`[data-pos="${tok.idx}"]`);
    if (clickedSpan) clickedSpan.classList.add("active");

    // Open sidebar with loading state
    sidebar.classList.remove("collapsed");
    const tokDisplay = tok.token;
    sidebarBody.innerHTML = `<div class="feature-title">Token: <span class="idx">"${escapeHtml(tokDisplay)}"</span></div>
        <div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px">Position ${tok.idx} — ${tok.top_features.length} active features</div>
        <div class="loading"><div class="spinner"></div><br>Loading feature details...</div>`;

    // Fetch top_tokens for each feature + similar tokens in parallel
    const maxVal = tok.top_features.length > 0 ? tok.top_features[0].activation : 1;
    const fetches = tok.top_features.map(f =>
        fetch(`/api/top_tokens/${f.feature}`).then(r => r.json()).catch(() => ({tokens: []}))
    );
    const similarFetch = fetch("/api/similar_tokens", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({features: tok.top_features, n: 20}),
    }).then(r => r.json()).catch(() => ({tokens: []}));

    const [topTokenResults, similarData] = await Promise.all([
        Promise.all(fetches),
        similarFetch,
    ]);

    // Build sidebar content
    let html = `<div class="feature-title">Token: <span class="idx">"${escapeHtml(tokDisplay)}"</span></div>`;
    html += `<div style="font-size:12px;color:var(--text-secondary);margin-bottom:16px">Position ${tok.idx} — ${tok.top_features.length} active features</div>`;

    // Active features section
    html += `<div class="examples-header">Active Features</div>`;
    for (let fi = 0; fi < tok.top_features.length; fi++) {
        const f = tok.top_features[fi];
        const pct = (f.activation / maxVal * 100).toFixed(0);
        const topToks = topTokenResults[fi]?.tokens || [];

        html += `<div style="margin-bottom:12px;padding:10px 12px;background:var(--hover-bg);border-radius:8px;border-left:3px solid rgba(139,157,131,${f.activation / maxVal})">`;
        html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer" class="token-feat-header" data-idx="${f.feature}">`;
        html += `<span style="font-family:var(--mono);font-weight:600;color:var(--accent)">#${f.feature}${interpTag(f.feature)}</span>`;
        html += `<div style="flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden"><div style="height:100%;background:var(--accent);border-radius:2px;width:${pct}%"></div></div>`;
        html += `<span style="font-family:var(--mono);font-size:11px;color:var(--text-muted)">${f.activation.toFixed(3)}</span>`;
        html += `</div>`;

        if (topToks.length > 0) {
            html += `<div style="display:flex;flex-wrap:wrap;gap:3px">`;
            for (const t of topToks.slice(0, 12)) {
                const text = displayToken(t.text);
                html += `<span style="display:inline-block;background:rgba(139,157,131,${Math.min(0.5, t.mean_act * 0.25)});border:1px solid rgba(139,157,131,0.2);border-radius:3px;padding:1px 5px;font-family:var(--mono);font-size:10px;white-space:pre" title="count: ${t.count}, mean act: ${t.mean_act.toFixed(3)}">${escapeHtml(text)}<span style="font-size:8px;opacity:0.5;margin-left:2px">${t.count}</span></span>`;
            }
            html += `</div>`;
        }
        html += `</div>`;
    }

    // Similar tokens section
    const simTokens = similarData.tokens || [];
    if (simTokens.length > 0) {
        html += `<div class="examples-header" style="margin-top:20px">Similar Feature Combinations</div>`;
        html += `<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">Tokens from training data that activate similar features</div>`;
        html += `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px">`;
        for (const st of simTokens) {
            const text = displayToken(st.text);
            const overlapPct = st.overlap / st.total_query;
            html += `<span style="display:inline-flex;align-items:center;gap:4px;background:rgba(139,157,131,${Math.min(0.5, overlapPct * 0.6)});border:1px solid rgba(139,157,131,0.3);border-radius:4px;padding:3px 8px;font-family:var(--mono);font-size:12px;white-space:pre;cursor:default" title="${st.overlap}/${st.total_query} features shared (${st.shared_features.map(f=>'#'+f).join(', ')})\nAppears ${st.count}x in training data">${escapeHtml(text)}<span style="font-size:9px;color:var(--text-muted);font-family:var(--font)">${st.overlap}/${st.total_query}</span></span>`;
        }
        html += `</div>`;
    }

    sidebarBody.innerHTML = html;

    // Click feature header to open full feature detail
    for (const el of sidebarBody.querySelectorAll(".token-feat-header")) {
        el.addEventListener("click", async () => {
            const featIdx = parseInt(el.dataset.idx);
            selectedIdx = featIdx;
            inferHighlightSet = null;
            draw();
            await showFeature(featIdx);
        });
    }
}

const VR_ROTATE_SENS = 6.0; // radians per meter of hand movement
const VR_ZOOM_SPEED = 0.06; // scene-units/frame when grip held
let vrSelectorHand = 'right'; // which controller does ray+select+grab-rotate

// VR panel drag state
let vrPanelDragging = false;

// VR panel scroll (R stick Y scrolls examples)

// Inline VRButton (Three.js r128 VRButton is ES module, can't load via script tag)
const VRButton = {
    createButton(renderer) {
        const button = document.createElement('button');
        button.style.cssText = 'position:absolute;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border:1px solid rgba(255,255,255,0.3);border-radius:8px;background:rgba(0,0,0,0.6);color:#fff;font-size:13px;cursor:pointer;z-index:999;font-family:sans-serif;backdrop-filter:blur(8px);transition:opacity 0.2s';

        function showEnterVR() {
            button.textContent = 'ENTER VR';
            button.style.opacity = '1';
            button.disabled = false;
            button.onclick = async () => {
                try {
                    const session = await navigator.xr.requestSession('immersive-vr', {
                        optionalFeatures: ['local-floor', 'bounded-floor']
                    });
                    renderer.xr.setSession(session);
                    button.textContent = 'EXIT VR';
                    button.onclick = () => { session.end(); };
                } catch (e) {
                    console.error('VR session failed:', e);
                }
            };
        }

        if ('xr' in navigator) {
            navigator.xr.isSessionSupported('immersive-vr').then(supported => {
                if (supported) {
                    showEnterVR();
                } else {
                    button.textContent = 'VR NOT SUPPORTED';
                    button.disabled = true;
                    button.style.opacity = '0.4';
                }
            });

            renderer.xr.addEventListener('sessionstart', () => {
                button.textContent = 'EXIT VR';
            });
            renderer.xr.addEventListener('sessionend', () => {
                showEnterVR();
            });
        } else {
            button.textContent = 'WEBXR NOT AVAILABLE';
            button.disabled = true;
            button.style.opacity = '0.4';
        }

        return button;
    }
};

// VR panel canvas helper: rounded rect path
function vrRoundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

// Render feature info to VR panel canvas — sidebar-style layout
// Compact token pills, color-highlighted examples, scroll support
function renderVRPanel(data, topTokens) {
    if (!vrPanelCtx) return;
    const ctx = vrPanelCtx;
    const w = vrPanelCanvas.width;
    const h = vrPanelCanvas.height;

    // Cache data for scroll redraws
    if (data) {
        vrPanelFeatureData = data;
        vrPanelTokenData = topTokens;
    }

    ctx.clearRect(0, 0, w, h);

    // Dark glass background
    ctx.fillStyle = 'rgba(10, 12, 18, 0.90)';
    vrRoundRect(ctx, 0, 0, w, h, 20);
    ctx.fill();

    // Subtle border glow
    ctx.strokeStyle = 'rgba(139, 157, 131, 0.30)';
    ctx.lineWidth = 2;
    vrRoundRect(ctx, 1, 1, w - 2, h - 2, 19);
    ctx.stroke();

    const pad = 28; // side padding

    if (!data) {
        // Initial state — instruction text
        ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
        ctx.font = '28px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Point at a star', w / 2, h / 2 - 30);
        ctx.fillText('and pull trigger', w / 2, h / 2 + 10);
        ctx.font = '18px sans-serif';
        ctx.fillStyle = 'rgba(255, 255, 255, 0.20)';
        ctx.fillText('Grips: zoom | Trigger drag: rotate', w / 2, h / 2 + 50);
        ctx.fillText('R-stick: scroll examples', w / 2, h / 2 + 76);
        ctx.textAlign = 'left';
    } else {
        // === SIDEBAR-STYLE LAYOUT ===
        // Clip to panel interior for scroll
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 0, w, h);
        ctx.clip();

        let y = 30 - vrPanelScroll; // scroll offset
        ctx.textAlign = 'left';

        // ── Feature title ──
        ctx.fillStyle = 'rgba(139, 157, 131, 0.95)';
        ctx.font = 'bold 30px sans-serif';
        ctx.fillText(`Feature #${data.feature_idx}`, pad, y + 24);
        y += 36;

        // ── Interpretation label ──
        const label = featureLabels[data.feature_idx];
        if (label && label.interp) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.80)';
            ctx.font = '20px sans-serif';
            // Word-wrap interp text
            const words = label.interp.split(' ');
            let line = '';
            const maxW = w - pad * 2;
            y += 6;
            for (const word of words) {
                const test = line + (line ? ' ' : '') + word;
                if (ctx.measureText(test).width > maxW && line) {
                    y += 22;
                    ctx.fillText(line, pad, y);
                    line = word;
                } else {
                    line = test;
                }
            }
            if (line) { y += 22; ctx.fillText(line, pad, y); }
        }

        // ── Thin divider ──
        y += 14;
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(w - pad, y); ctx.stroke();
        y += 10;

        // ── Stats grid (2x2 compact) ──
        ctx.font = '14px sans-serif';
        const stats = [
            ['Density', (data.density * 100).toFixed(3) + '%'],
            ['Max', data.max_act.toFixed(4)],
            ['Mean', data.mean_act.toFixed(4)],
            ['Fires', data.fire_count.toLocaleString()],
        ];
        const halfW = (w - pad * 2) / 2;
        for (let i = 0; i < 4; i++) {
            const col = i % 2;
            const row = Math.floor(i / 2);
            const sx = pad + col * halfW;
            const sy = y + row * 32;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.40)';
            ctx.font = '13px sans-serif';
            ctx.fillText(stats[i][0], sx, sy + 14);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.90)';
            ctx.font = 'bold 16px sans-serif';
            ctx.fillText(stats[i][1], sx + 58, sy + 14);
        }
        y += 70;

        // ── Top Tokens (compact pill flow) ──
        if (topTokens && topTokens.length > 0) {
            ctx.fillStyle = 'rgba(139, 157, 131, 0.60)';
            ctx.font = 'bold 14px sans-serif';
            ctx.fillText('TOP TOKENS', pad, y);
            y += 16;

            // Flow layout: pills wrap horizontally
            let px = pad;
            ctx.font = '13px monospace';
            const maxToks = Math.min(topTokens.length, 16);
            const pillH = 22;
            const pillGap = 5;

            for (let i = 0; i < maxToks; i++) {
                const tok = topTokens[i];
                const text = (tok.text || '').replace(/\n/g, '\\n').replace(/\t/g, '\\t');
                const display = text.length > 12 ? text.slice(0, 10) + '..' : text;
                const label = `${display}`;
                const tw = ctx.measureText(label).width + 14;

                // Wrap to next line if overflow
                if (px + tw > w - pad) {
                    px = pad;
                    y += pillH + pillGap;
                }

                // Pill bg — intensity from activation
                const intensity = Math.min(0.5, (tok.mean_act || 0) * 0.25);
                ctx.fillStyle = `rgba(139, 157, 131, ${0.12 + intensity})`;
                vrRoundRect(ctx, px, y - 14, tw, pillH, 4);
                ctx.fill();

                // Pill border
                ctx.strokeStyle = `rgba(139, 157, 131, ${0.2 + intensity})`;
                ctx.lineWidth = 1;
                vrRoundRect(ctx, px, y - 14, tw, pillH, 4);
                ctx.stroke();

                // Text
                ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
                ctx.font = '13px monospace';
                ctx.fillText(label, px + 6, y);

                px += tw + pillGap;
            }
            y += pillH + 8;
        }

        // ── Divider ──
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(w - pad, y); ctx.stroke();
        y += 14;

        // ── Examples with color-highlighted tokens ──
        if (data.examples && data.examples.length > 0) {
            ctx.fillStyle = 'rgba(139, 157, 131, 0.60)';
            ctx.font = 'bold 14px sans-serif';
            ctx.fillText(`EXAMPLES (${data.examples.length})`, pad, y);

            // Scroll indicator
            if (vrPanelScrollMax > 0) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText('R-stick ↕ scroll', w - pad, y);
                ctx.textAlign = 'left';
            }
            y += 18;

            // Find max activation for normalization
            let maxAct = 1;
            for (const ex of data.examples) {
                for (const span of (ex.spans || [])) {
                    if (span.a > maxAct) maxAct = span.a;
                }
            }

            for (let ei = 0; ei < data.examples.length; ei++) {
                const ex = data.examples[ei];
                const spans = ex.spans || [];
                if (spans.length === 0) continue;

                // Example container bg
                ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
                // Measure total height needed (approx 2-4 lines)
                const exTop = y;

                // Peak activation badge
                if (ex.peak_activation) {
                    ctx.fillStyle = 'rgba(139, 157, 131, 0.50)';
                    ctx.font = '11px sans-serif';
                    ctx.fillText(`peak: ${ex.peak_activation.toFixed(3)}`, pad + 4, y + 10);
                    y += 18;
                }

                // Render tokens with color highlighting — flow-wrap
                ctx.font = '14px monospace';
                let tx = pad + 4;
                const lineH = 20;
                const maxX = w - pad - 4;

                for (const span of spans) {
                    const t = (span.t || '').replace(/\n/g, ' ');
                    if (!t) continue;
                    const tw = ctx.measureText(t).width;

                    // Wrap
                    if (tx + tw > maxX && tx > pad + 20) {
                        tx = pad + 4;
                        y += lineH;
                    }

                    // Color highlight: activation → green bg intensity
                    if (span.a > 0.1) {
                        const norm = Math.min(1, span.a / maxAct);
                        const bgAlpha = 0.08 + norm * 0.45;
                        ctx.fillStyle = `rgba(139, 157, 131, ${bgAlpha})`;
                        ctx.fillRect(tx - 1, y - 12, tw + 2, lineH - 2);
                    }

                    // Token text
                    ctx.fillStyle = span.a > 0.1
                        ? `rgba(255, 255, 255, ${0.7 + Math.min(0.3, span.a / maxAct * 0.3)})`
                        : 'rgba(255, 255, 255, 0.50)';
                    ctx.fillText(t, tx, y + 2);
                    tx += tw;
                }

                y += lineH + 10;

                // Thin separator between examples
                if (ei < data.examples.length - 1) {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                    ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(pad + 8, y); ctx.lineTo(w - pad - 8, y); ctx.stroke();
                    y += 8;
                }

                // Stop rendering if way below canvas (but track total for scroll)
                if (y > h + vrPanelScroll + 200) break;
            }

            // Compute max scroll
            const totalContentH = y + vrPanelScroll;
            vrPanelScrollMax = Math.max(0, totalContentH - h + 30);
        } else {
            vrPanelScrollMax = 0;
        }

        ctx.restore();

        // Scroll indicator bar (right edge)
        if (vrPanelScrollMax > 0) {
            const barH = Math.max(40, h * (h / (h + vrPanelScrollMax)));
            const barY = (vrPanelScroll / vrPanelScrollMax) * (h - barH);
            ctx.fillStyle = 'rgba(139, 157, 131, 0.25)';
            vrRoundRect(ctx, w - 8, barY + 4, 4, barH - 8, 2);
            ctx.fill();
        }
    }

    if (vrPanelTexture) vrPanelTexture.needsUpdate = true;
}

function initThreeJS() {
    const rect = canvasContainer.getBoundingClientRect();
    const w = rect.width;
    const h = rect.height;

    // Clean up previous
    if (threeRenderer) {
        threeRenderer.setAnimationLoop(null);
        threeContainer.removeChild(threeRenderer.domElement);
        threeRenderer.dispose();
    }
    // Remove old VR button if re-initializing
    const oldVrBtn = threeContainer.querySelector('button');
    if (oldVrBtn) oldVrBtn.remove();

    threeScene = new THREE.Scene();
    threeCamera = new THREE.PerspectiveCamera(60, w / h, 0.01, 1000);
    threeRenderer = new THREE.WebGLRenderer({ antialias: true });
    threeRenderer.setSize(w, h);
    threeRenderer.setPixelRatio(window.devicePixelRatio || 1);
    threeContainer.appendChild(threeRenderer.domElement);

    // Enable WebXR
    threeRenderer.xr.enabled = true;

    // Camera rig — parent of camera + controllers. Scaling the rig makes the scene feel massive.
    vrRig = new THREE.Group();
    vrRig.add(threeCamera);
    threeScene.add(vrRig);

    // Build point cloud
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(features.length * 3);
    pointColors = new Float32Array(features.length * 3);
    pointSizes = new Float32Array(features.length);

    // Compute 3D bounds for centering
    let xMin = Infinity, xMax = -Infinity;
    let yMin = Infinity, yMax = -Infinity;
    let zMin = Infinity, zMax = -Infinity;
    for (const f of features) {
        if (f.x3 < xMin) xMin = f.x3;
        if (f.x3 > xMax) xMax = f.x3;
        if (f.y3 < yMin) yMin = f.y3;
        if (f.y3 > yMax) yMax = f.y3;
        if (f.z3 < zMin) zMin = f.z3;
        if (f.z3 > zMax) zMax = f.z3;
    }
    const cx = (xMin + xMax) / 2;
    const cy = (yMin + yMax) / 2;
    const cz = (zMin + zMax) / 2;
    const range = Math.max(xMax - xMin, yMax - yMin, zMax - zMin);
    const scale3d = 20.0 / range; // normalize to ~[-10, 10]

    for (let i = 0; i < features.length; i++) {
        const f = features[i];
        positions[i * 3] = (f.x3 - cx) * scale3d;
        positions[i * 3 + 1] = (f.y3 - cy) * scale3d;
        positions[i * 3 + 2] = (f.z3 - cz) * scale3d;

        // Default — will be set by updateThreeColors
        pointColors[i * 3] = 0.545;
        pointColors[i * 3 + 1] = 0.616;
        pointColors[i * 3 + 2] = 0.514;

        pointSizes[i] = 1.0;
    }

    pointOpacities = new Float32Array(features.length).fill(1.0);
    pointGlows = new Float32Array(features.length).fill(0.0);
    pointRings = new Float32Array(features.length).fill(0.0);

    geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute("color", new THREE.BufferAttribute(pointColors, 3));
    geometry.setAttribute("size", new THREE.BufferAttribute(pointSizes, 1));
    geometry.setAttribute("opacity", new THREE.BufferAttribute(pointOpacities, 1));
    geometry.setAttribute("glow", new THREE.BufferAttribute(pointGlows, 1));
    geometry.setAttribute("ring", new THREE.BufferAttribute(pointRings, 1));

    // Custom shader material — small crisp points with depth fog + glow
    const material = new THREE.ShaderMaterial({
        uniforms: {
            pointMultiplier: { value: Math.min(w, h) * 0.8 },
            fogNear: { value: 2.0 },
            fogFar: { value: 45.0 },
            glowIntensity: { value: 1.0 },
        },
        vertexShader: `
            attribute float size;
            attribute float opacity;
            attribute float glow;
            attribute float ring;
            varying vec3 vColor;
            varying float vDepth;
            varying float vOpacity;
            varying float vGlow;
            varying float vRing;
            varying float vSize;
            uniform float pointMultiplier;
            void main() {
                vColor = color;
                vOpacity = opacity;
                vGlow = glow;
                vRing = ring;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                float depth = -mvPosition.z;
                vDepth = depth;

                // Steep depth scaling: depth^2 makes close stars dramatically bigger
                float s = size * pointMultiplier / (max(depth, 0.1) * max(depth, 0.1));
                if (glow > 0.0) s *= (1.0 + glow);
                // Soft ceiling: keeps growing past 200 but logarithmically
                if (s > 200.0) s = 200.0 + 40.0 * log(s / 200.0);
                gl_PointSize = max(s, 0.3);
                vSize = gl_PointSize;
                gl_Position = projectionMatrix * mvPosition;
            }
        `,
        fragmentShader: `
            varying vec3 vColor;
            varying float vDepth;
            varying float vOpacity;
            varying float vGlow;
            varying float vRing;
            varying float vSize;
            uniform float fogNear;
            uniform float fogFar;
            uniform float glowIntensity;
            void main() {
                vec2 uv = gl_PointCoord - vec2(0.5);
                float d = length(uv);
                if (d > 0.5) discard;

                float fogFactor = 1.0 - clamp((vDepth - fogNear) / (fogFar - fogNear), 0.0, 0.9);

                vec3 col = vColor;
                float alpha;

                // White-hot core + colored tail glow
                float inv = 1.0 / (1.0 + 2000.0 * d * d);
                float core = inv * inv * inv; // cubed
                float tail = 1.0 / (1.0 + 100.0 * d * d); // wider for visibility at distance

                // Size-adaptive glow: far=lots, mid=suppressed, near=moderate
                float tailScale = (0.4 / (1.0 + vSize * 0.25) + 0.02) * glowIntensity;

                if (vGlow > 0.0) {
                    // Thin crosshair pinpoint on hover/select
                    float crossX = exp(-uv.y * uv.y * 2000.0) * exp(-abs(uv.x) * 6.0);
                    float crossY = exp(-uv.x * uv.x * 2000.0) * exp(-abs(uv.y) * 6.0);
                    float cross = (crossX + crossY) * 0.25 * vGlow;
                    col = mix(col, vec3(1.0), core * vGlow * 0.4);
                    alpha = (core + tail * tailScale * 0.5) * fogFactor;
                } else {
                    // Core goes full white, tail stays colored
                    col = mix(col, vec3(1.0), core);
                    alpha = (core + tail * tailScale) * fogFactor * vOpacity;
                }


                gl_FragColor = vec4(col, alpha);
            }
        `,
        vertexColors: true,
        transparent: true,
        depthWrite: false,
        depthTest: true,
        blending: THREE.AdditiveBlending,
    });

    threePoints = new THREE.Points(geometry, material);
    threeScene.add(threePoints);

    // Add ring sprites for labeled features (auto-billboard = always face camera)
    updateThreeLabelRings();

    // Save base point multiplier for VR scaling
    basePointMultiplier = Math.min(w, h) * 0.8;

    // Compute leash radius: 2x the furthest point from center
    let maxPtDist = 0;
    for (let i = 0; i < features.length; i++) {
        const dx = positions[i*3], dy = positions[i*3+1], dz = positions[i*3+2];
        const d = Math.sqrt(dx*dx + dy*dy + dz*dz);
        if (d > maxPtDist) maxPtDist = d;
    }
    vrMaxRadius = maxPtDist * 2;

    // === VR Setup ===
    // VR button
    const vrBtn = VRButton.createButton(threeRenderer);
    threeContainer.appendChild(vrBtn);

    // Controllers
    vrControllerR = threeRenderer.xr.getController(1); // right hand
    vrControllerL = threeRenderer.xr.getController(0); // left hand
    vrRig.add(vrControllerR);
    vrRig.add(vrControllerL);

    // === VR Controller events ===
    // Selector hand: grab-rotate (drag) / select star (tap) / drag panel (if pointing at it)
    // Non-selector trigger: swap which hand is the selector

    // Shared select logic (fetches feature data, updates panel)
    async function vrSelectStar() {
        if (threeHoverIdx === null) return;
        const f = features[threeHoverIdx];
        selectedIdx = f.i;
        updateThreeColors();
        vrPanelScroll = 0;
        if (vrPanelMesh) vrPanelMesh.visible = true;

        renderVRPanel({
            feature_idx: f.i, density: f.d, max_act: f.mx,
            mean_act: f.mn, fire_count: 0, examples: [],
        }, []);

        try {
            const [featureResp, neighborsResp, tokensResp] = await Promise.all([
                fetch(`/api/feature/${f.i}`),
                fetch(`/api/neighbors/${f.i}`),
                fetch(`/api/top_tokens/${f.i}`),
            ]);
            if (!featureResp.ok) throw new Error(`API ${featureResp.status}`);
            const data = await featureResp.json();
            const nbrs = await neighborsResp.json();
            const toks = await tokensResp.json();
            neighborData = nbrs.neighbors || [];
            updateThreeNeighborLines();
            renderFeature(data, toks.tokens || [], neighborData);
            renderVRPanel(data, toks.tokens || []);
        } catch (e) {
            console.error('VR feature fetch error:', e);
        }
    }

    // Check if controller ray hits the visible panel
    function vrCheckPanelHit(ctrl) {
        if (!vrPanelMesh || !vrPanelMesh.visible) return null;
        ctrl.updateMatrixWorld(true);
        const wp = new THREE.Vector3();
        wp.setFromMatrixPosition(ctrl.matrixWorld);
        const wq = new THREE.Quaternion();
        ctrl.getWorldQuaternion(wq);
        const wd = new THREE.Vector3(0, 0, -1).applyQuaternion(wq);
        const rc = new THREE.Raycaster(wp, wd, 0, 100);
        const hits = rc.intersectObject(vrPanelMesh);
        return hits.length > 0 ? hits[0] : null;
    }

    // Swap selector to the given hand
    function vrSwapSelector(hand) {
        if (vrSelectorHand === hand) return;
        vrSelectorHand = hand;
        vrPanelDragging = false; // cancel any panel drag
        const oldCtrl = hand === 'right' ? vrControllerL : vrControllerR;
        const newCtrl = hand === 'right' ? vrControllerR : vrControllerL;
        if (vrRayLine) {
            oldCtrl.remove(vrRayLine);
            newCtrl.add(vrRayLine);
        }
    }

    // Selector trigger start: check panel hit → drag panel, else → grab-rotate
    function vrSelectorStart(ctrl) {
        // Priority 1: if pointing at panel, drag it
        const panelHit = vrCheckPanelHit(ctrl);
        if (panelHit) {
            vrPanelDragging = true;
            vrPanelDragDist = panelHit.distance; // world units
            return;
        }
        // Priority 2: grab-rotate (or tap-to-select on release)
        vrGrabbing = true;
        vrGrabMoved = false;
        vrGrabStartLocal = ctrl.position.clone();
        vrGrabPrevLocal = ctrl.position.clone();
    }

    // Selector trigger end
    async function vrSelectorEnd() {
        if (vrPanelDragging) {
            vrPanelDragging = false;
            return;
        }
        if (!vrGrabbing) return;
        vrGrabbing = false;
        if (!vrGrabMoved) await vrSelectStar();
    }

    // Right controller trigger
    vrControllerR.addEventListener('selectstart', () => {
        if (!vrActive) return;
        if (vrSelectorHand === 'right') {
            vrSelectorStart(vrControllerR);
        } else {
            vrSwapSelector('right');
        }
    });
    vrControllerR.addEventListener('selectend', async () => {
        if (vrSelectorHand !== 'right') return;
        await vrSelectorEnd();
    });

    // Left controller trigger
    vrControllerL.addEventListener('selectstart', () => {
        if (!vrActive) return;
        if (vrSelectorHand === 'left') {
            vrSelectorStart(vrControllerL);
        } else {
            vrSwapSelector('left');
        }
    });
    vrControllerL.addEventListener('selectend', async () => {
        if (vrSelectorHand !== 'left') return;
        await vrSelectorEnd();
    });

    // Ray visualization (white line from right controller)
    const rayPoints = [new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -50)];
    const rayGeom = new THREE.BufferGeometry().setFromPoints(rayPoints);
    const rayMat = new THREE.LineBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.4,
        blending: THREE.AdditiveBlending,
    });
    vrRayLine = new THREE.Line(rayGeom, rayMat);
    vrRayLine.visible = false;
    vrControllerR.add(vrRayLine); // child of controller = moves with it

    // VR info panel (canvas texture on plane)
    vrPanelCanvas = document.createElement('canvas');
    vrPanelCanvas.width = 1024;
    vrPanelCanvas.height = 768;
    vrPanelCtx = vrPanelCanvas.getContext('2d');
    vrPanelTexture = new THREE.CanvasTexture(vrPanelCanvas);
    vrPanelTexture.minFilter = THREE.LinearFilter;

    const panelGeom = new THREE.PlaneGeometry(0.65, 0.50);
    const panelMat = new THREE.MeshBasicMaterial({
        map: vrPanelTexture,
        transparent: true,
        side: THREE.DoubleSide,
        depthWrite: false,
    });
    vrPanelMesh = new THREE.Mesh(panelGeom, panelMat);
    // Panel is child of camera — head-locked HUD, immune to rig rotation
    // Position is in camera-local space (meters from your face)
    vrPanelMesh.position.set(0.20, -0.15, -0.50);
    vrPanelMesh.visible = false;
    threeCamera.add(vrPanelMesh);

    // Render initial panel state
    renderVRPanel(null, null);

    // Session start: enter VR
    threeRenderer.xr.addEventListener('sessionstart', () => {
        vrActive = true;

        // Transfer camera position to rig
        vrRig.position.copy(camPos);
        vrRig.quaternion.copy(camQuat);
        vrRig.scale.set(VR_SCALE, VR_SCALE, VR_SCALE);

        // Reset camera local transform (XR headset manages it now)
        threeCamera.position.set(0, 0, 0);
        threeCamera.quaternion.identity();

        // Adjust shader uniforms for rig scale
        const invS = 1.0 / VR_SCALE;
        threePoints.material.uniforms.fogNear.value = 2.0 * invS;
        threePoints.material.uniforms.fogFar.value = 45.0 * invS;
        threePoints.material.uniforms.pointMultiplier.value = basePointMultiplier * invS * invS * 4.0;
        threePoints.material.uniforms.glowIntensity.value = 4.0;

        vrPanelMesh.visible = false; // hidden until a star is selected
        vrRayLine.visible = true;
    });

    // Session end: exit VR
    threeRenderer.xr.addEventListener('sessionend', () => {
        vrActive = false;

        // Capture rig world position back to camPos
        camPos.copy(vrRig.position);
        camQuat.copy(vrRig.quaternion);

        // Reset rig
        vrRig.scale.set(1, 1, 1);

        // Restore shader uniforms
        threePoints.material.uniforms.fogNear.value = 2.0;
        threePoints.material.uniforms.fogFar.value = 45.0;
        threePoints.material.uniforms.pointMultiplier.value = basePointMultiplier;
        threePoints.material.uniforms.glowIntensity.value = 1.0;

        vrPanelMesh.visible = false;
        vrRayLine.visible = false;

        // Upload diagnostic log to server
        if (vrDiagLog.length > 0) {
            fetch('/api/vr_diag', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({log: vrDiagLog}),
            }).then(r => r.json()).then(d => {
                console.log('VR diag saved:', d);
                toolbarStats.textContent += ` | VR diag: ${d.frames} frames saved`;
            }).catch(e => console.error('VR diag upload failed:', e));
        }

        // Next frame, flat-mode code sets camera from camPos/camQuat
    });

    // Screen-space picking: project 3D points to screen and find closest to mouse
    const _projVec = new THREE.Vector3();
    function findClosest3D(screenX, screenY, maxDist) {
        const positions = threePoints.geometry.attributes.position.array;
        const rect = threeRenderer.domElement.getBoundingClientRect();
        const hw = rect.width / 2;
        const hh = rect.height / 2;
        let bestIdx = -1, bestDist = Infinity;

        for (let i = 0; i < features.length; i++) {
            _projVec.set(positions[i * 3], positions[i * 3 + 1], positions[i * 3 + 2]);
            _projVec.project(threeCamera);
            // Skip points behind camera
            if (_projVec.z > 1) continue;
            const sx = (_projVec.x * hw) + hw;
            const sy = (-_projVec.y * hh) + hh;
            const d = Math.hypot(screenX - sx, screenY - sy);
            if (d < bestDist && d < maxDist) {
                bestIdx = i;
                bestDist = d;
            }
        }
        return bestIdx >= 0 ? bestIdx : null;
    }

    const domEl = threeRenderer.domElement;

    // Click+drag to pointer lock for look-around, release to unlock
    domEl.addEventListener("mousedown", (e) => {
        if (e.button === 2 || e.button === 0) {
            if (!document.pointerLockElement) {
                domEl.requestPointerLock();
            }
            threeAutoRotate = false;
        }
    });

    domEl.addEventListener("contextmenu", (e) => e.preventDefault());

    window.addEventListener("mouseup", (e) => {
        if (document.pointerLockElement) {
            document.exitPointerLock();
        }
    });

    document.addEventListener("pointerlockchange", () => {
        if (!document.pointerLockElement) {
            domEl.style.cursor = "crosshair";
        }
    });

    window.addEventListener("mousemove", (e) => {
        if (document.pointerLockElement === domEl && viewMode === "3d") {
            const dx = e.movementX;
            const dy = e.movementY;

            threeCamera.updateMatrixWorld();
            const screenRight = new THREE.Vector3().setFromMatrixColumn(threeCamera.matrixWorld, 0).normalize();

            // FPV mouse-look with pointer lock — no edge limits
            const sens = 0.003;
            const qYaw = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), -dx * sens);
            const qPitch = new THREE.Quaternion().setFromAxisAngle(screenRight, -dy * sens);
            camQuat.premultiply(qYaw).premultiply(qPitch).normalize();
        }
    });

    // WASD key handlers
    window.addEventListener("keydown", (e) => {
        if (viewMode !== "3d") return;
        // Don't capture if typing in an input
        if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
        const k = e.key.toLowerCase();
        if (["w","a","s","d","e","q"," ","shift","arrowup","arrowdown","arrowleft","arrowright"].includes(k)) {
            keysDown.add(k);
            threeAutoRotate = false;
            e.preventDefault();
        }
    });
    window.addEventListener("keyup", (e) => {
        keysDown.delete(e.key.toLowerCase());
    });

    domEl.addEventListener("wheel", (e) => {
        e.preventDefault();
        // Scroll adjusts WASD fly speed (like Minecraft spectator)
        if (e.deltaY < 0) {
            flySpeed = Math.min(flySpeed * 1.3, 2.0);
        } else {
            flySpeed = Math.max(flySpeed / 1.3, 0.001);
        }
    }, { passive: false });

    // Hover detection — screen-space picking (disabled during pointer lock)
    domEl.addEventListener("mousemove", (e) => {
        if (document.pointerLockElement) return;
        const rect = domEl.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        const idx = findClosest3D(mx, my, 10);

        if (idx !== null) {
            const f = features[idx];
            domEl.style.cursor = "pointer";

            tooltip.style.display = "block";
            tooltip.style.left = (e.clientX + 14) + "px";
            tooltip.style.top = (e.clientY + 14) + "px";
            const label = featureLabels[f.i];
            const interpText3d = label && label.interp ? label.interp : (label && label.autointerp && label.autointerp !== "dead" ? label.autointerp : "");
            const isTentative3d = label && label.confidence === "tentative";
            const interpStr = interpText3d ? `<div class="tt-interp" style="${isTentative3d ? 'color:#c9a227' : ''}">${isTentative3d ? '⚠ ' : ''}${escapeHtml(interpText3d)}</div>` : '';
            tooltip.innerHTML = `<div class="tt-idx">Feature #${f.i}</div>` +
                interpStr +
                `<div class="tt-stats">density: ${(f.d * 100).toFixed(2)}% | max: ${f.mx.toFixed(3)}</div>`;

            if (threeHoverIdx !== idx) {
                threeHoverIdx = idx;
                hoverHighlightSet = new Set([f.i]);
                updateThreeColors();
            }
        } else {
            tooltip.style.display = "none";
            if (!document.pointerLockElement) domEl.style.cursor = "crosshair";
            if (threeHoverIdx !== null) {
                threeHoverIdx = null;
                hoverHighlightSet = null;
                updateThreeColors();
            }
        }
    });

    domEl.addEventListener("mouseleave", () => {
        tooltip.style.display = "none";
        if (threeHoverIdx !== null) {
            threeHoverIdx = null;
            hoverHighlightSet = null;
            updateThreeColors();
        }
    });

    // Click detection — screen-space picking
    let threeClickStart = null;
    domEl.addEventListener("mousedown", (e) => {
        threeClickStart = { x: e.clientX, y: e.clientY, time: Date.now() };
    });
    domEl.addEventListener("mouseup", async (e) => {
        if (!threeClickStart) return;
        const dx = e.clientX - threeClickStart.x;
        const dy = e.clientY - threeClickStart.y;
        const dt = Date.now() - threeClickStart.time;
        threeClickStart = null;
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5 || dt > 300) return;

        const rect = domEl.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const idx = findClosest3D(mx, my, 10);

        if (idx !== null) {
            const f = features[idx];
            selectedIdx = f.i;
            updateThreeColors();
            await showFeature(f.i);
        } else {
            selectedIdx = null;
            neighborData = null;
            highlightSet = null;
            searchResults = null;
            searchInput.value = "";
            searchStatus.textContent = "";
            updateThreeColors();
        }
    });

    updateThreeColors();
    threeRenderer.setAnimationLoop(threeAnimate);
}

function updateThreeColors() {
    if (!threePoints || viewMode !== "3d") return;
    const dark = isDarkMode();
    const pos = threePoints.geometry.attributes.position.array;

    const hoverSet = getEffectiveHoverHighlightSet();
    const activeHighlight = (hoverSet && hoverSet.size > 0) ? hoverSet
        : (inferHighlightSet && inferHighlightSet.size > 0) ? inferHighlightSet
        : highlightSet;
    const hasHighlight = activeHighlight && activeHighlight.size > 0;

    const hasFocusHighlight = (inferHighlightSet && inferHighlightSet.size > 0)
        || (highlightSet && highlightSet.size > 0);

    for (let i = 0; i < features.length; i++) {
        const f = features[i];

        // Hide dead features: make invisible
        if (hideDead && featureLabels[f.i] && featureLabels[f.i].confidence === "dead") {
            pointColors[i * 3] = 0; pointColors[i * 3 + 1] = 0; pointColors[i * 3 + 2] = 0;
            pointSizes[i] = 0;
            pointOpacities[i] = 0;
            pointGlows[i] = 0;
            pointRings[i] = 0;
            continue;
        }

        const isSelected = f.i === selectedIdx;
        const isHoverHL = hoverSet && hoverSet.size > 0 && hoverSet.has(f.i);
        const isInferHL = inferHighlightSet && inferHighlightSet.size > 0 && inferHighlightSet.has(f.i);
        const isSearchHL = highlightSet && highlightSet.size > 0 && highlightSet.has(f.i);

        // Always compute the rainbow color
        let h, s, l;
        if (colorMode === "position") {
            const px = pos[i * 3], py = pos[i * 3 + 1], pz = pos[i * 3 + 2];
            h = (Math.atan2(pz, px) + Math.PI) / (2 * Math.PI);
            s = 0.5 + Math.max(0, Math.min(1, (py + 2) / 4)) * 0.3;
            const logD = Math.log10(Math.max(f.d, 1e-6));
            l = Math.max(0.3, Math.min(0.9, (logD + 5) / 4));
        } else {
            [h, s, l] = featureColorHSL(f);
        }
        let [r, g, b] = hslToRgb(h, s, l);
        let size = 1.0;
        let opacity = 1.0;
        let glowAmt = 0.0;

        const lb = featureLabels[f.i];
        const hasLabel = lb && (lb.interp || lb.autointerp);
        if (hasLabel) size = 1.8;

        // Dead features: smaller + dimmer
        if (lb && lb.confidence === "dead") {
            size = 0.6;
            opacity = 0.4;
        }

        if (isSelected) {
            // White with subtle crosshair
            r = 1.0; g = 1.0; b = 1.0;
            size = 3.0;
            glowAmt = 0.5;
        } else if (isHoverHL) {
            // Keep own color, thin crosshair
            size = 2.5;
            glowAmt = 0.4;
        } else if (isInferHL || isSearchHL) {
            // Keep own color, subtle glow
            size = 2.0;
            glowAmt = 0.3;
        }

        pointColors[i * 3] = r;
        pointColors[i * 3 + 1] = g;
        pointColors[i * 3 + 2] = b;
        pointSizes[i] = size;
        pointOpacities[i] = opacity;
        pointGlows[i] = glowAmt;
        pointRings[i] = getFeatureRingColor(f.i) ? 1.0 : 0.0;
    }

    threePoints.geometry.attributes.color.needsUpdate = true;
    threePoints.geometry.attributes.size.needsUpdate = true;
    threePoints.geometry.attributes.opacity.needsUpdate = true;
    threePoints.geometry.attributes.glow.needsUpdate = true;
    threePoints.geometry.attributes.ring.needsUpdate = true;
}

function threeAnimate(time, xrFrame) {
    if (viewMode !== "3d") return;

    const inVR = threeRenderer.xr.isPresenting;

    try {
        if (inVR) {
            // === VR PATH ===

            // === Controls: grip zoom, trigger grab-rotate, R-stick scroll ===
            const session = threeRenderer.xr.getSession();
            const selectorCtrl = vrSelectorHand === 'right' ? vrControllerR : vrControllerL;

            // Get head quaternion (rig-local) for view-aligned input
            let headQuat = threeCamera.quaternion;
            try {
                const xrCam = threeRenderer.xr.getCamera();
                if (xrCam) headQuat = xrCam.quaternion;
            } catch(e) {}
            // Composite world camera quat = rig * head
            const worldCamQuat = vrRig.quaternion.clone().multiply(headQuat);

            if (session && session.inputSources) {
                // Zoom: grip buttons. Direction = where you're actually looking (world space)
                const headForward = new THREE.Vector3(0, 0, -1).applyQuaternion(worldCamQuat);
                if (headForward.lengthSq() > 0.001) headForward.normalize();

                for (const source of session.inputSources) {
                    if (!source.gamepad) continue;
                    const btns = source.gamepad.buttons;
                    if (!btns || btns.length < 2) continue;
                    const gripVal = btns[1].value || (btns[1].pressed ? 1 : 0);
                    if (gripVal > 0.1) {
                        const dir = source.handedness === 'right' ? 1 : -1;
                        vrRig.position.addScaledVector(headForward, dir * gripVal * VR_ZOOM_SPEED);
                    }
                }
            }

            // Grab-ROTATE: view-aligned trackball rotation
            // Project hand delta onto head's view axes, then rotate around screen axes.
            // Exactly like desktop mouse-look: premultiply world-space rotations.
            if (vrGrabbing && !vrPanelDragging && vrGrabPrevLocal && selectorCtrl) {
                try {
                    const currLocal = selectorCtrl.position.clone();
                    const frameDelta = currLocal.sub(vrGrabPrevLocal);
                    const totalMoved = selectorCtrl.position.clone()
                        .sub(vrGrabStartLocal).length();

                    if (totalMoved > VR_GRAB_THRESHOLD) {
                        vrGrabMoved = true;

                        // Project rig-local hand delta onto head's view axes
                        // This makes "hand right" = "visual right" regardless of head turn
                        const headRight = new THREE.Vector3(1, 0, 0).applyQuaternion(headQuat);
                        const headUp = new THREE.Vector3(0, 1, 0).applyQuaternion(headQuat);
                        const dx = frameDelta.dot(headRight); // visual-right component
                        const dy = frameDelta.dot(headUp);    // visual-up component

                        if (Math.abs(dx) > 0.0001 || Math.abs(dy) > 0.0001) {
                            // World-space view axes for rotation
                            const screenRight = new THREE.Vector3(1, 0, 0)
                                .applyQuaternion(worldCamQuat).normalize();
                            const screenUp = new THREE.Vector3(0, 1, 0)
                                .applyQuaternion(worldCamQuat).normalize();

                            // Trackball: rotate around view-up for horizontal, view-right for vertical
                            // No world-Y lock = no polar lock. Starfield has no horizon.
                            const qH = new THREE.Quaternion().setFromAxisAngle(
                                screenUp, dx * VR_ROTATE_SENS
                            );
                            const qV = new THREE.Quaternion().setFromAxisAngle(
                                screenRight, -dy * VR_ROTATE_SENS
                            );
                            vrRig.quaternion.premultiply(qH)
                                .premultiply(qV).normalize();
                        }
                    }

                    vrGrabPrevLocal = selectorCtrl.position.clone();
                } catch(e) {}
            }

            // Panel drag: move panel in camera-local space along controller ray
            // Panel is child of camera, so position is relative to your head
            if (vrPanelDragging && selectorCtrl && vrPanelMesh) {
                selectorCtrl.updateMatrixWorld(true);
                const wp = new THREE.Vector3();
                wp.setFromMatrixPosition(selectorCtrl.matrixWorld);
                const wq = new THREE.Quaternion();
                selectorCtrl.getWorldQuaternion(wq);
                const wd = new THREE.Vector3(0, 0, -1).applyQuaternion(wq);
                const worldTarget = wp.clone().addScaledVector(wd, vrPanelDragDist);
                // Convert world target to camera-local space
                threeCamera.updateMatrixWorld(true);
                threeCamera.worldToLocal(worldTarget);
                vrPanelMesh.position.copy(worldTarget);
            }

            // R-stick scroll for VR panel
            if (session && session.inputSources) {
                for (const source of session.inputSources) {
                    if (source.handedness !== 'right' || !source.gamepad) continue;
                    const axes = source.gamepad.axes;
                    if (axes.length >= 4) {
                        const stickY = axes[3];
                        if (Math.abs(stickY) > 0.15) {
                            vrPanelScroll = Math.max(0, Math.min(vrPanelScrollMax,
                                vrPanelScroll + stickY * 8));
                            if (vrPanelFeatureData) {
                                renderVRPanel(vrPanelFeatureData, vrPanelTokenData);
                            }
                        }
                    }
                }
            }

            // Clamp position: leash to 2x the furthest point from center
            const rigDist = vrRig.position.length();
            if (rigDist > vrMaxRadius) {
                vrRig.position.multiplyScalar(vrMaxRadius / rigDist);
            }

            // VR ray picking + ray shortening
            vrRayHitDist = -1; // reset each frame
            if (selectorCtrl && threePoints) {
                try {
                    const ctrlPos = new THREE.Vector3();
                    const ctrlDir = new THREE.Vector3(0, 0, -1);
                    selectorCtrl.updateMatrixWorld(true);
                    ctrlPos.setFromMatrixPosition(selectorCtrl.matrixWorld);
                    const ctrlQuat = new THREE.Quaternion();
                    selectorCtrl.getWorldQuaternion(ctrlQuat);
                    ctrlDir.applyQuaternion(ctrlQuat);

                    // Check panel intersection first (for ray cutoff)
                    if (vrPanelMesh && vrPanelMesh.visible) {
                        const rc = new THREE.Raycaster(ctrlPos, ctrlDir, 0, 100);
                        const panelHits = rc.intersectObject(vrPanelMesh);
                        if (panelHits.length > 0) {
                            vrRayHitDist = panelHits[0].distance;
                        }
                    }

                    // Star picking
                    const positions = threePoints.geometry.attributes.position.array;
                    let bestIdx = -1, bestDist = Infinity;
                    let bestT = Infinity;
                    const threshold = 0.5;
                    const tmpVec = new THREE.Vector3();
                    const tmpProj = new THREE.Vector3();

                    for (let i = 0; i < features.length; i++) {
                        tmpVec.set(positions[i * 3], positions[i * 3 + 1], positions[i * 3 + 2]);
                        tmpVec.sub(ctrlPos);
                        const t = tmpVec.dot(ctrlDir);
                        if (t < 0 || t > 50) continue;
                        tmpProj.copy(ctrlDir).multiplyScalar(t);
                        const dist = tmpVec.distanceTo(tmpProj);
                        if (dist < threshold && dist < bestDist) {
                            bestIdx = i;
                            bestDist = dist;
                            bestT = t;
                        }
                    }

                    // Track nearest star for ray cutoff
                    if (bestIdx >= 0) {
                        if (vrRayHitDist < 0 || bestT < vrRayHitDist) {
                            vrRayHitDist = bestT;
                        }
                    }

                    if (bestIdx >= 0 && bestIdx !== threeHoverIdx) {
                        threeHoverIdx = bestIdx;
                        hoverHighlightSet = new Set([features[bestIdx].i]);
                        updateThreeColors();
                    } else if (bestIdx < 0 && threeHoverIdx !== null) {
                        threeHoverIdx = null;
                        hoverHighlightSet = null;
                        updateThreeColors();
                    }

                    // Shorten ray to nearest hit (convert world dist → controller-local z)
                    if (vrRayLine) {
                        const rayPos = vrRayLine.geometry.attributes.position.array;
                        if (vrRayHitDist > 0) {
                            rayPos[5] = -(vrRayHitDist / VR_SCALE); // z of endpoint
                        } else {
                            rayPos[5] = -50; // full length
                        }
                        vrRayLine.geometry.attributes.position.needsUpdate = true;
                    }
                } catch(e) { /* controller not ready yet */ }
            }

        } else {
            // === FLAT PATH (unchanged) ===

            // Rig stays at identity in flat mode
            vrRig.position.set(0, 0, 0);
            vrRig.quaternion.identity();
            vrRig.scale.set(1, 1, 1);

            if (threeAutoRotate && !document.pointerLockElement) {
                const angle = 0.001;
                const cos = Math.cos(angle), sin = Math.sin(angle);
                const x = camPos.x, z = camPos.z;
                camPos.x = x * cos - z * sin;
                camPos.z = x * sin + z * cos;
                const autoRot = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), angle);
                camQuat.premultiply(autoRot).normalize();
            }

            const moveSpeed = flySpeed;
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camQuat);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camQuat);
            const up = new THREE.Vector3(0, 1, 0);
            if (keysDown.has("w") || keysDown.has("arrowup")) camPos.addScaledVector(forward, moveSpeed);
            if (keysDown.has("s") || keysDown.has("arrowdown")) camPos.addScaledVector(forward, -moveSpeed);
            if (keysDown.has("a") || keysDown.has("arrowleft")) camPos.addScaledVector(right, -moveSpeed);
            if (keysDown.has("d") || keysDown.has("arrowright")) camPos.addScaledVector(right, moveSpeed);
            if (keysDown.has("e") || keysDown.has(" ")) camPos.addScaledVector(up, moveSpeed);
            if (keysDown.has("q") || keysDown.has("shift")) camPos.addScaledVector(up, -moveSpeed);

            threeCamera.position.copy(camPos);
            threeCamera.quaternion.copy(camQuat);
            threeCamera.updateMatrixWorld();

            if (threePoints) {
                threePoints.material.uniforms.fogNear.value = 2.0;
                threePoints.material.uniforms.fogFar.value = 45.0;
            }
        }

        // === SHARED PATH ===

        // Scale label ring sprites to match star screen size
        const ringGroup = threeScene.getObjectByName("labelRings");
        if (ringGroup && threePoints) {
            let effectiveCamPos = camPos;
            if (inVR) {
                try {
                    effectiveCamPos = threeRenderer.xr.getCamera().getWorldPosition(new THREE.Vector3());
                } catch(e) {
                    effectiveCamPos = vrRig.position;
                }
            }
            const pmVal = threePoints.material.uniforms.pointMultiplier.value;
            for (const sprite of ringGroup.children) {
                const dist = effectiveCamPos.distanceTo(sprite.position);
                let starPx = 1.8 * pmVal / (Math.max(dist, 0.1) * Math.max(dist, 0.1));
                if (starPx > 200) starPx = 200 + 40 * Math.log(starPx / 200);
                const fov = threeCamera.fov * Math.PI / 180;
                const focalPx = threeRenderer.domElement.height / (2 * Math.tan(fov / 2));
                const ringWorldSize = starPx * 0.08 * dist / focalPx;
                sprite.scale.set(ringWorldSize, ringWorldSize, 1);
            }
        }
    } catch (e) {
        // Log but don't kill the animation loop
        if (!threeAnimate._errLogged) {
            console.error("threeAnimate error:", e);
            threeAnimate._errLogged = true;
        }
    }

    // ALWAYS render — even if VR logic above threw. This is what the Quest
    // needs to see frames and exit the "entering VR" loading screen.
    threeScene.background = new THREE.Color(0x000000);
    threeRenderer.render(threeScene, threeCamera);

    if (!inVR) {
        updateProximityLabels();
    }
}

const _proxLabelsContainer = document.getElementById("proximity-labels");
const _proxLinesCanvas = document.getElementById("proximity-lines");
const _proxLinesCtx = _proxLinesCanvas.getContext("2d");
const _proxLabelEls = {}; // feature_idx -> DOM element
const _proxVec = new THREE.Vector3();
const PROX_FADE_NEAR = 0.2;  // full opacity at this distance
const PROX_FADE_FAR = 0.8;   // invisible beyond this
const _proxLineData = []; // [{sx, sy, lx, ly, opacity}] for drawing lines

function updateProximityLabels() {
    if (!threePoints || viewMode !== "3d") return;
    const positions = threePoints.geometry.attributes.position.array;
    const rect = canvasContainer.getBoundingClientRect();
    const hw = rect.width / 2, hh = rect.height / 2;

    // Resize line canvas to match container
    if (_proxLinesCanvas.width !== rect.width || _proxLinesCanvas.height !== rect.height) {
        _proxLinesCanvas.width = rect.width;
        _proxLinesCanvas.height = rect.height;
    }
    _proxLinesCtx.clearRect(0, 0, _proxLinesCanvas.width, _proxLinesCanvas.height);
    _proxLineData.length = 0;

    const active = new Set();

    for (let i = 0; i < features.length; i++) {
        const f = features[i];
        const label = featureLabels[f.i];
        if (!label || !(label.interp || label.autointerp)) continue;
        if (hideDead && label.confidence === "dead") continue;

        // Distance from camera
        _proxVec.set(positions[i * 3], positions[i * 3 + 1], positions[i * 3 + 2]);
        const dist = camPos.distanceTo(_proxVec);

        if (dist > PROX_FADE_FAR) {
            // Too far — remove if exists
            if (_proxLabelEls[f.i]) {
                _proxLabelEls[f.i].style.opacity = "0";
            }
            continue;
        }

        // Project to screen
        _proxVec.project(threeCamera);
        // Behind camera
        if (_proxVec.z > 1) {
            if (_proxLabelEls[f.i]) _proxLabelEls[f.i].style.opacity = "0";
            continue;
        }

        const sx = (1 + _proxVec.x) * hw;
        const sy = (1 - _proxVec.y) * hh;

        // Off screen
        if (sx < -100 || sx > rect.width + 100 || sy < -50 || sy > rect.height + 50) {
            if (_proxLabelEls[f.i]) _proxLabelEls[f.i].style.opacity = "0";
            continue;
        }

        // Opacity: 1.0 at PROX_FADE_NEAR, 0.0 at PROX_FADE_FAR
        const opacity = 1.0 - Math.max(0, Math.min(1, (dist - PROX_FADE_NEAR) / (PROX_FADE_FAR - PROX_FADE_NEAR)));

        active.add(f.i);

        // Compute star screen size (matching shader soft ceiling)
        const pointMult = threePoints.material.uniforms.pointMultiplier.value;
        let starPx = pointMult / (Math.max(dist, 0.1) * Math.max(dist, 0.1));
        if (starPx > 200) starPx = 200 + 40 * Math.log(starPx / 200);
        const scale = Math.max(0.25, Math.min(0.8, starPx / 25));
        // Offset: start at ring edge (matching ring sprite size)
        const offset = starPx * 0.08 + 2;

        let el = _proxLabelEls[f.i];
        if (!el) {
            el = document.createElement("div");
            el.className = "proximity-label";
            const plText = label.interp || label.autointerp || "";
            const plTentative = !label.interp && label.confidence === "tentative";
            el.innerHTML = `<div class="pl-idx">Feature #${f.i}</div>`
                + `<div class="pl-interp" style="${plTentative ? 'color:#c9a227' : ''}">${plTentative ? '⚠ ' : ''}${escapeHtml(plText)}</div>`
                + `<div class="pl-stats">density: ${(f.d * 100).toFixed(2)}% | max: ${f.mx.toFixed(3)}</div>`;
            _proxLabelsContainer.appendChild(el);
            _proxLabelEls[f.i] = el;
        }
        el.style.left = sx + "px";
        el.style.top = sy + "px";
        el.style.opacity = opacity.toFixed(2);
        el.style.borderColor = `rgba(255,255,255,${(opacity * 0.4).toFixed(2)})`;
        el.style.transform = `translate(${offset}px, -50%) scale(${scale.toFixed(2)})`;
        el.style.fontSize = "9px";

        // Draw line from star to label
        _proxLineData.push({ sx, sy, lx: sx + offset * scale, ly: sy, opacity });
    }

    // Clean up labels for features no longer in range
    for (const idx in _proxLabelEls) {
        if (!active.has(Number(idx)) && _proxLabelEls[idx].style.opacity !== "0") {
            _proxLabelEls[idx].style.opacity = "0";
        }
    }

    // Draw connecting lines from stars to labels
    for (const ld of _proxLineData) {
        _proxLinesCtx.beginPath();
        _proxLinesCtx.moveTo(ld.sx, ld.sy);
        _proxLinesCtx.lineTo(ld.lx, ld.ly);
        _proxLinesCtx.strokeStyle = `rgba(255, 255, 255, ${(ld.opacity * 0.3).toFixed(2)})`;
        _proxLinesCtx.lineWidth = 1;
        _proxLinesCtx.stroke();
    }
}

// === Resize handler ===
window.addEventListener("resize", () => {
    resize();
    if (viewMode === "2d") {
        draw();
    } else if (threeRenderer) {
        const rect = canvasContainer.getBoundingClientRect();
        threeCamera.aspect = rect.width / rect.height;
        threeCamera.updateProjectionMatrix();
        threeRenderer.setSize(rect.width, rect.height);
        basePointMultiplier = Math.min(rect.width, rect.height) * 0.8;
        if (!vrActive) {
            threePoints.material.uniforms.pointMultiplier.value = basePointMultiplier;
        }
    }
});

// === Init ===
init().catch(err => {
    console.error("Init failed:", err);
    toolbarStats.textContent = "LOAD FAILED: " + err.message;
    toolbarStats.style.color = "#e44";
});
</script>
</body>
