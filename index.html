<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baguettotron Feature Explorer</title>
<style>
/* === Reset & Base === */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg: #F3EDE3;
    --accent: #8B9D83;
    --accent-hover: #7A8C73;
    --accent-light: rgba(139, 157, 131, 0.15);
    --panel: #FFFFFF;
    --panel-shadow: 0 8px 32px rgba(0,0,0,0.08);
    --panel-radius: 12px;
    --border: #E0E0E0;
    --text: #2A2A2A;
    --text-secondary: #666666;
    --text-muted: #999999;
    --hover-bg: #F5F5F5;
    --canvas-bg: #F3EDE3;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
    --mono: 'Consolas', 'Monaco', 'SF Mono', monospace;
}

[data-theme="dark"] {
    --bg: #1a1a1a;
    --accent: #8B9D83;
    --accent-hover: #9DB094;
    --accent-light: rgba(139, 157, 131, 0.2);
    --panel: #242424;
    --panel-shadow: 0 8px 32px rgba(0,0,0,0.3);
    --border: #3a3a3a;
    --text: #e0e0e0;
    --text-secondary: #aaaaaa;
    --text-muted: #777777;
    --hover-bg: #2e2e2e;
    --canvas-bg: #1a1a1a;
}

html, body {
    height: 100%;
    overflow: hidden;
    font-family: var(--font);
    color: var(--text);
    background: var(--bg);
}

/* No dot grid — clean background */

/* === Layout === */
.app {
    display: flex;
    height: 100vh;
    gap: 0;
}

.main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
}

.toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: var(--panel);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    z-index: 10;
}

.toolbar h1 {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
}

.toolbar .sep {
    width: 1px;
    height: 20px;
    background: var(--border);
}

.search-wrap {
    position: relative;
    flex: 0 1 320px;
}

.search-wrap input {
    width: 100%;
    padding: 7px 12px 7px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    background: var(--panel);
    color: var(--text);
    transition: border-color 0.15s;
}

.search-wrap input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(139,157,131,0.1);
}

.search-status {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
}

.toolbar-stats {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-secondary);
    white-space: nowrap;
}

/* Color mode dropdown styled inline */

/* === Canvas === */
.canvas-container {
    flex: 1;
    position: relative;
    overflow: hidden;
}

canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: crosshair;
}

.proximity-label {
    position: absolute;
    pointer-events: none;
    font-family: var(--mono);
    color: rgba(255, 255, 255, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 4px;
    padding: 2px 6px;
    white-space: nowrap;
    transform-origin: left center;
}
.proximity-label .pl-idx { font-weight: 600; color: var(--accent); }
.proximity-label .pl-interp { font-style: italic; opacity: 0.85; }
.proximity-label .pl-stats { color: rgba(255,255,255,0.5); }

/* Tooltip */
.tooltip {
    position: fixed;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    pointer-events: none;
    z-index: 100;
    max-width: 250px;
    display: none;
}

.tooltip .tt-idx {
    font-weight: 600;
    color: var(--accent);
}

.tooltip .tt-interp {
    color: var(--text);
    font-weight: 400;
    font-style: italic;
    margin-top: 2px;
}

.tooltip .tt-stats {
    color: var(--text-secondary);
    margin-top: 2px;
}

/* === Sidebar === */
.sidebar {
    width: 420px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    box-shadow: var(--panel-shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.2s ease;
}

.sidebar.collapsed {
    width: 0;
    border-left: none;
}

.sidebar-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.sidebar-header .label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--text);
    opacity: 0.7;
}

.sidebar-close {
    background: none;
    border: none;
    font-size: 18px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    line-height: 1;
}

.sidebar-close:hover {
    background: var(--hover-bg);
    color: var(--text-secondary);
}

.sidebar-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
}

/* Scrollbar */
.sidebar-body::-webkit-scrollbar { width: 8px; }
.sidebar-body::-webkit-scrollbar-track { background: transparent; }
.sidebar-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.sidebar-body::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Feature header */
.feature-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
}

.feature-title .idx {
    color: var(--accent);
}

/* Interp edit box */
.interp-box {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    margin-bottom: 12px;
}

.interp-input {
    flex: 1;
    padding: 8px 12px;
    font-family: var(--font);
    font-size: 14.5px;
    font-weight: 600;
    font-style: italic;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--hover-bg);
    color: var(--text);
    outline: none;
}

.interp-input:focus {
    border-color: var(--accent);
}

.interp-save {
    padding: 6px 12px;
    font-size: 12px;
    font-family: var(--font);
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
}

.interp-save:hover { background: var(--accent-hover); }
.interp-save:disabled { opacity: 0.5; cursor: not-allowed; }

/* Stats grid */
.stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 12px 0 16px;
}

.stat-card {
    background: var(--hover-bg);
    border-radius: 8px;
    padding: 10px 12px;
}

.stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    margin-bottom: 2px;
}

.stat-value {
    font-size: 15px;
    font-weight: 600;
    font-family: var(--mono);
}

/* Examples */
.examples-header {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--text);
    opacity: 0.7;
    margin: 16px 0 8px;
}

.example {
    background: var(--hover-bg);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    word-break: break-word;
    border-left: 3px solid transparent;
}

.example .peak {
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-family: var(--font);
}

/* Token highlighting */
.tok {
    padding: 1px 0;
    border-radius: 2px;
    white-space: pre-wrap;
}

.tok.hot {
    background: rgba(139, 157, 131, var(--intensity));
    border-bottom: 2px solid rgba(139, 157, 131, calc(var(--intensity) * 1.5));
}

/* Empty state */
.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    text-align: center;
    padding: 40px;
}

.empty-state .icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.3;
}

.empty-state p {
    font-size: 13px;
    line-height: 1.6;
}

/* Loading */
.loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
}

.spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-bottom: 8px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Search results list */
.search-results {
    margin-top: 8px;
}

.search-result-item {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px 8px;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.1s;
}

.search-result-item:hover {
    background: var(--hover-bg);
}

.search-result-item .feat-idx {
    font-family: var(--mono);
    font-weight: 600;
    color: var(--accent);
}

.search-result-item .feat-score {
    font-family: var(--mono);
    color: var(--text-muted);
    font-size: 11px;
    margin-left: auto;
}

.search-result-item .feat-bar {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
}

.search-result-item .feat-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
}

/* === Inference Panel === */
.infer-panel {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    background: var(--panel);
}

.infer-panel.hidden { display: none; }

.infer-toggle {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    background: transparent;
    color: var(--text-secondary);
    transition: all 0.15s;
}

.infer-toggle.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
}

.infer-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
}

.infer-row textarea {
    flex: 1;
    resize: vertical;
    min-height: 40px;
    max-height: 120px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.4;
    background: var(--panel);
    color: var(--text);
}

.infer-row textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(139,157,131,0.1);
}

.infer-row button {
    padding: 8px 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
}

.infer-row button:hover { background: var(--accent-hover); }
.infer-row button:disabled { opacity: 0.5; cursor: not-allowed; }

.infer-tokens {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.8;
}

.infer-tok {
    padding: 1px 0;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: pre-wrap;
    transition: background 0.1s;
    position: relative;
}

.infer-tok:hover, .infer-tok.active {
    background: rgba(139, 157, 131, 0.2);
    border-bottom-color: var(--accent);
}

/* Inference feature popup */
.infer-popup {
    position: fixed;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    z-index: 200;
    width: 280px;
    max-height: 340px;
    overflow-y: auto;
    display: none;
}

.infer-popup .popup-header {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
}

.infer-popup .popup-feat {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 6px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.1s;
}

.infer-popup .popup-feat:hover {
    background: var(--hover-bg);
}

.infer-popup .popup-feat .pf-idx {
    font-family: var(--mono);
    font-weight: 600;
    color: var(--accent);
    min-width: 50px;
}

.infer-popup .popup-feat .pf-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
}

.infer-popup .popup-feat .pf-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
}

.infer-popup .popup-feat .pf-val {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    min-width: 40px;
    text-align: right;
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
/* Static mode overrides */
#infer-toggle { display: none !important; }
#umap-toggle {
    opacity: 0.35 !important;
    cursor: not-allowed !important;
    pointer-events: none !important;
}
#umap-toggle::after {
    content: " (static)";
    font-size: 9px;
}
</style>
</head>
<body>

<div class="app">
    <div class="main-area">
        <div class="toolbar">
            <h1>Baguettotron SAE</h1>
            <div class="sep"></div>
            <div class="search-wrap">
                <input type="text" id="search" placeholder="Search tokens (e.g. DNA, code, math)..." spellcheck="false">
            </div>
            <span class="search-status" id="search-status"></span>
            <select id="color-mode" style="font-size:11px;background:var(--bg-secondary);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;padding:3px 6px">
                <option value="act+density" selected>Act + Density</option>
                <option value="mean">Mean Activation</option>
                <option value="max">Max Activation</option>
                <option value="density">Density</option>
                <option value="position">Position</option>
            </select>
            <button class="infer-toggle" id="infer-toggle" title="Live inference (requires --gpu)">Inference</button>
            <button class="infer-toggle" id="view-toggle" title="Toggle 2D/3D UMAP">3D</button>
            <!-- <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-secondary)" title="Spread points apart (power-law scaling)">
                Spread <input type="range" id="spread-slider" min="0.5" max="4" step="0.1" value="1" style="width:60px;height:14px">
                <span id="spread-val" style="font-family:var(--mono);min-width:24px">1.0</span>
            </label> -->
            <label id="glow-label" style="display:none;align-items:center;gap:4px;font-size:11px;color:var(--text-secondary)" title="Glow intensity for star halos">
                Glow <input type="range" id="glow-slider" min="0" max="1000" value="1000" style="width:60px;height:14px">
                <span id="glow-val" style="font-family:var(--mono);min-width:28px">10.0</span>
            </label>
            <label style="display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text-secondary);cursor:pointer" title="Hide dead/inactive features from the map">
                <input type="checkbox" id="hide-dead" checked style="margin:0"> Hide dead
            </label>
            <button class="infer-toggle" id="umap-toggle" title="UMAP parameter controls">UMAP</button>
            <button class="infer-toggle" id="theme-toggle" title="Toggle dark mode">Dark</button>
            <span class="toolbar-stats" id="toolbar-stats">Loading...</span>
        </div>
        <div class="infer-panel hidden" id="umap-panel" style="gap:16px;align-items:center;flex-wrap:wrap">
            <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-secondary)">
                Neighbors <input type="range" id="umap-neighbors" min="2" max="100" value="20" style="width:80px">
                <span id="umap-neighbors-val" style="font-family:var(--mono);min-width:20px;font-size:11px">20</span>
            </label>
            <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-secondary)">
                Min Dist <input type="range" id="umap-mindist" min="0" max="100" value="10" style="width:80px">
                <span id="umap-mindist-val" style="font-family:var(--mono);min-width:28px;font-size:11px">0.10</span>
            </label>
            <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-secondary)">
                Spread <input type="range" id="umap-spread" min="10" max="300" value="100" style="width:80px">
                <span id="umap-spread-val" style="font-family:var(--mono);min-width:28px;font-size:11px">1.00</span>
            </label>
            <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-secondary)">
                Epochs <input type="range" id="umap-epochs" min="0" max="2000" step="50" value="0" style="width:80px">
                <span id="umap-epochs-val" style="font-family:var(--mono);min-width:28px;font-size:11px">auto</span>
            </label>
            <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-secondary)">
                Metric
                <select id="umap-metric" style="font-size:11px;background:var(--bg-secondary);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;padding:2px 4px">
                    <option value="cosine" selected>cosine</option>
                    <option value="euclidean">euclidean</option>
                    <option value="manhattan">manhattan</option>
                    <option value="correlation">correlation</option>
                </select>
            </label>
            <button class="infer-toggle" id="umap-run-2d" style="background:var(--accent);color:white;border-color:var(--accent)">Recompute 2D</button>
            <button class="infer-toggle" id="umap-run-3d" style="background:var(--accent);color:white;border-color:var(--accent)">Recompute 3D</button>
            <span id="umap-status" style="font-size:11px;color:var(--text-muted)"></span>
        </div>
        <div class="infer-panel hidden" id="infer-panel" style="flex-direction:column">
            <div class="infer-row">
                <textarea id="infer-text" placeholder="Type text to analyze... (Ctrl+Enter to run)" rows="2"></textarea>
                <button id="infer-run">Run</button>
                <button id="infer-combined" title="Show features activated by the full text combined">Combined</button>
            </div>
            <div class="infer-tokens" id="infer-tokens"></div>
        </div>
        <div class="canvas-container" id="canvas-container">
            <canvas id="umap"></canvas>
            <div id="three-container" style="display:none;position:absolute;top:0;left:0;width:100%;height:100%"></div>
            <canvas id="proximity-lines" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none"></canvas>
            <div id="proximity-labels" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden"></div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="label">Feature Detail</span>
            <button class="sidebar-close" id="sidebar-close">&times;</button>
        </div>
        <div class="sidebar-body" id="sidebar-body">
            <div class="empty-state">
                <div class="icon">&#x25CF;</div>
                <p>Click a point on the UMAP to inspect a feature.<br>
                Use the search bar to find tokens and highlight correlated features.</p>
            </div>
        </div>
    </div>
</div>

<div class="tooltip" id="tooltip"></div>
<div class="infer-popup" id="infer-popup"></div>

<script>

// === STATIC MODE: Fetch Shim ===
const _STATIC_MODE = true;
let _neighborsAll = null;
let _topTokensAll = null;
let _searchIndex = null;

const _origFetch = window.fetch;
window.fetch = function(url, opts) {
    if (typeof url !== 'string') return _origFetch(url, opts);

    // /static/feature_data.json -> data/feature_data.json
    if (url === '/static/feature_data.json') {
        return _origFetch('data/feature_data.json');
    }

    // /api/labels -> data/labels.json
    if (url === '/api/labels') {
        return _origFetch('data/labels.json');
    }

    // /api/feature/<id> -> features/<id>.json
    const featureMatch = url.match(/^\/api\/feature\/(\d+)/);
    if (featureMatch) {
        return _origFetch('features/' + featureMatch[1] + '.json');
    }

    // /api/neighbors/<id> -> lookup from preloaded data
    const neighborMatch = url.match(/^\/api\/neighbors\/(\d+)/);
    if (neighborMatch && _neighborsAll) {
        const idx = neighborMatch[1];
        const data = _neighborsAll[idx] || [];
        return Promise.resolve(new Response(JSON.stringify({
            feature_idx: parseInt(idx),
            neighbors: data,
        }), {status: 200, headers: {'Content-Type': 'application/json'}}));
    }

    // /api/top_tokens/<id> -> lookup from preloaded data
    const topTokenMatch = url.match(/^\/api\/top_tokens\/(\d+)/);
    if (topTokenMatch && _topTokensAll) {
        const idx = topTokenMatch[1];
        const data = _topTokensAll[idx] || [];
        return Promise.resolve(new Response(JSON.stringify({
            feature_idx: parseInt(idx),
            tokens: data,
        }), {status: 200, headers: {'Content-Type': 'application/json'}}));
    }

    // /api/search?q=... -> client-side search
    const searchMatch = url.match(/^\/api\/search\?q=(.+)/);
    if (searchMatch && _searchIndex) {
        const q = decodeURIComponent(searchMatch[1]).toLowerCase().trim();
        return Promise.resolve(new Response(JSON.stringify(_clientSearch(q)),
            {status: 200, headers: {'Content-Type': 'application/json'}}));
    }

    // /api/gpu_status -> always false
    if (url === '/api/gpu_status') {
        return Promise.resolve(new Response(JSON.stringify({gpu_ready: false}),
            {status: 200, headers: {'Content-Type': 'application/json'}}));
    }

    // /api/infer -> not available
    if (url.startsWith('/api/infer')) {
        return Promise.resolve(new Response(JSON.stringify({error: "Not available in static mode"}),
            {status: 503, headers: {'Content-Type': 'application/json'}}));
    }

    // /api/umap -> not available
    if (url.startsWith('/api/umap')) {
        return Promise.resolve(new Response(JSON.stringify({error: "Not available in static mode"}),
            {status: 503, headers: {'Content-Type': 'application/json'}}));
    }

    // /api/label/<id> POST -> save to localStorage
    const labelMatch = url.match(/^\/api\/label\/(\d+)/);
    if (labelMatch && opts && opts.method === 'POST') {
        const fid = labelMatch[1];
        try {
            const body = JSON.parse(opts.body);
            const saved = JSON.parse(localStorage.getItem('sae_labels') || '{}');
            saved[fid] = body.interp || '';
            localStorage.setItem('sae_labels', JSON.stringify(saved));
        } catch(e) {}
        return Promise.resolve(new Response(JSON.stringify({ok: true}),
            {status: 200, headers: {'Content-Type': 'application/json'}}));
    }

    // /api/similar_tokens -> not available in static
    if (url.startsWith('/api/similar_tokens')) {
        return Promise.resolve(new Response(JSON.stringify({tokens: []}),
            {status: 200, headers: {'Content-Type': 'application/json'}}));
    }

    // /api/vr_diag -> noop
    if (url.startsWith('/api/vr_diag')) {
        return Promise.resolve(new Response(JSON.stringify({ok: true}),
            {status: 200, headers: {'Content-Type': 'application/json'}}));
    }

    // Fallthrough: original fetch
    return _origFetch(url, opts);
};

function _clientSearch(q) {
    if (!_searchIndex || q.length < 2) return {query: q, n_matching_tokens: 0, features: []};

    // Find all token texts that contain the query
    const featureScores = {};
    let nMatching = 0;
    for (const [text, feats] of Object.entries(_searchIndex)) {
        if (text.includes(q)) {
            nMatching++;
            for (const {i, s} of feats) {
                featureScores[i] = (featureScores[i] || 0) + s;
            }
        }
    }

    // Sort and take top 50
    const sorted = Object.entries(featureScores)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 50)
        .map(([i, s]) => ({i: parseInt(i), s: Math.round(s * 10000) / 10000}));

    return {query: q, n_matching_tokens: nMatching, features: sorted};
}

// === Spread: power-law scaling from centroid ===
let spreadValue = 1.0;

function applySpread(s) {
    spreadValue = s;
    if (features.length === 0) return;

    // 2D spread
    let cx2 = 0, cy2 = 0;
    for (const f of features) { cx2 += f._ox; cy2 += f._oy; }
    cx2 /= features.length; cy2 /= features.length;

    for (const f of features) {
        const dx = f._ox - cx2;
        const dy = f._oy - cy2;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 1e-8) { f.x = f._ox; f.y = f._oy; continue; }
        const scaled = Math.pow(dist, s);
        const ratio = scaled / dist;
        f.x = cx2 + dx * ratio;
        f.y = cy2 + dy * ratio;
    }

    // 3D spread
    if (features[0]._ox3 !== undefined) {
        let cx3 = 0, cy3 = 0, cz3 = 0;
        for (const f of features) { cx3 += f._ox3; cy3 += f._oy3; cz3 += f._oz3; }
        cx3 /= features.length; cy3 /= features.length; cz3 /= features.length;

        for (const f of features) {
            const dx = f._ox3 - cx3;
            const dy = f._oy3 - cy3;
            const dz = f._oz3 - cz3;
            const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
            if (dist < 1e-8) { f.x3 = f._ox3; f.y3 = f._oy3; f.z3 = f._oz3; continue; }
            const scaled = Math.pow(dist, s);
            const ratio = scaled / dist;
            f.x3 = cx3 + dx * ratio;
            f.y3 = cy3 + dy * ratio;
            f.z3 = cz3 + dz * ratio;
        }
    }
}

function computeBounds() {
    dataXMin = Infinity; dataXMax = -Infinity;
    dataYMin = Infinity; dataYMax = -Infinity;
    for (const f of features) {
        if (f.x < dataXMin) dataXMin = f.x;
        if (f.x > dataXMax) dataXMax = f.x;
        if (f.y < dataYMin) dataYMin = f.y;
        if (f.y > dataYMax) dataYMax = f.y;
    }
    const padX = (dataXMax - dataXMin) * 0.05;
    const padY = (dataYMax - dataYMin) * 0.05;
    dataXMin -= padX; dataXMax += padX;
    dataYMin -= padY; dataYMax += padY;
}

async function recomputeUMAP(nComponents) {
    const params = {
        n_neighbors: parseInt(umapNeighborsSlider.value),
        min_dist: umapMindistSlider.value / 100,
        spread: umapSpreadSlider.value / 100,
        n_epochs: parseInt(umapEpochsSlider.value),
        metric: document.getElementById("umap-metric").value,
        n_components: nComponents,
    };

    const btn2d = document.getElementById("umap-run-2d");
    const btn3d = document.getElementById("umap-run-3d");
    btn2d.disabled = btn3d.disabled = true;
    umapStatus.textContent = `Computing ${nComponents}D UMAP...`;

    try {
        const resp = await fetch("/api/umap", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(params),
        });
        const data = await resp.json();
        if (data.error) { umapStatus.textContent = `Error: ${data.error}`; return; }

        // Apply new coordinates
        for (const c of data.coords) {
            const f = features[c.i];
            if (!f) continue;
            if (nComponents === 2) {
                f._ox = c.x; f._oy = c.y;
            } else {
                f._ox3 = c.x3; f._oy3 = c.y3; f._oz3 = c.z3;
            }
        }

        // Re-apply current spread
        applySpread(spreadValue);
        computeBounds();

        if (nComponents === 2) {
            resetView();
            draw();
        } else if (threePoints) {
            // Update 3D positions
            const positions = threePoints.geometry.attributes.position.array;
            let xMin = Infinity, xMax = -Infinity;
            let yMin = Infinity, yMax = -Infinity;
            let zMin = Infinity, zMax = -Infinity;
            for (const f of features) {
                if (f.x3 < xMin) xMin = f.x3;
                if (f.x3 > xMax) xMax = f.x3;
                if (f.y3 < yMin) yMin = f.y3;
                if (f.y3 > yMax) yMax = f.y3;
                if (f.z3 < zMin) zMin = f.z3;
                if (f.z3 > zMax) zMax = f.z3;
            }
            const cx = (xMin + xMax) / 2;
            const cy = (yMin + yMax) / 2;
            const cz = (zMin + zMax) / 2;
            const range = Math.max(xMax - xMin, yMax - yMin, zMax - zMin) || 1;
            const scale3d = 20.0 / range;
            for (let i = 0; i < features.length; i++) {
                const f = features[i];
                positions[i * 3] = (f.x3 - cx) * scale3d;
                positions[i * 3 + 1] = (f.y3 - cy) * scale3d;
                positions[i * 3 + 2] = (f.z3 - cz) * scale3d;
            }
            threePoints.geometry.attributes.position.needsUpdate = true;
            updateThreeColors();
        }

        umapStatus.textContent = `Done in ${data.elapsed}s`;
    } catch (e) {
        umapStatus.textContent = `Error: ${e.message}`;
    } finally {
        btn2d.disabled = btn3d.disabled = false;
    }
}

document.getElementById("umap-run-2d").addEventListener("click", () => recomputeUMAP(2));
document.getElementById("umap-run-3d").addEventListener("click", () => recomputeUMAP(3));

// === Canvas sizing ===
function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + "px";
    canvas.style.height = rect.height + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function resetView() {
    const rect = canvas.parentElement.getBoundingClientRect();
    const w = rect.width;
    const h = rect.height;
    const dataW = dataXMax - dataXMin;
    const dataH = dataYMax - dataYMin;
    viewScale = Math.min(w / dataW, h / dataH) * 0.9;
    viewX = w / 2 - (dataXMin + dataW / 2) * viewScale;
    viewY = h / 2 + (dataYMin + dataH / 2) * viewScale;
}

function worldToScreen(wx, wy) {
    return [wx * viewScale + viewX, -wy * viewScale + viewY];
}

function screenToWorld(sx, sy) {
    return [(sx - viewX) / viewScale, -(sy - viewY) / viewScale];
}

// === Drawing ===
function isDarkMode() {
    return document.documentElement.getAttribute("data-theme") === "dark";
}

// HSL to RGB (h in 0-1, s in 0-1, l in 0-1) -> [r,g,b] each 0-1
function hslToRgb(h, s, l) {
    const c = (1 - Math.abs(2 * l - 1)) * s;
    const h6 = h * 6;
    const x = c * (1 - Math.abs((h6 % 2) - 1));
    const m = l - c / 2;
    let r, g, b;
    const sector = Math.floor(h6) % 6;
    if (sector === 0) { r = c; g = x; b = 0; }
    else if (sector === 1) { r = x; g = c; b = 0; }
    else if (sector === 2) { r = 0; g = c; b = x; }
    else if (sector === 3) { r = 0; g = x; b = c; }
    else if (sector === 4) { r = x; g = 0; b = c; }
    else { r = c; g = 0; b = x; }
    return [r + m, g + m, b + m];
}

// Get rainbow color for a feature based on current colorMode
// Uses percentile ranks (_rd, _rm, _rx) so colors span full spectrum
function featureColorHSL(f) {
    const dR = f._rd || 0;  // density rank 0-1
    const mR = f._rm || 0;  // mean activation rank 0-1
    const xR = f._rx || 0;  // max activation rank 0-1

    if (colorMode === "position") {
        const hue = (Math.atan2(f.y, f.x) + Math.PI) / (2 * Math.PI);
        return [hue, 0.7, 0.35 + dR * 0.3];
    } else if (colorMode === "density") {
        return [0.65 - dR * 0.65, 0.7, 0.35 + dR * 0.25];
    } else if (colorMode === "mean") {
        return [0.65 - mR * 0.65, 0.75, 0.35 + mR * 0.25];
    } else if (colorMode === "max") {
        return [0.65 - xR * 0.65, 0.75, 0.35 + xR * 0.25];
    } else { // act+density
        const hue = 0.65 - mR * 0.65;
        const sat = 0.3 + dR * 0.6;
        const light = 0.3 + mR * 0.2 + dR * 0.15;
        return [hue, sat, light];
    }
}

function featureRainbowCSS(f, alpha) {
    const [h, s, l] = featureColorHSL(f);
    const [r, g, b] = hslToRgb(h, s, l);
    return `rgba(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)},${alpha})`;
}

function draw() {
    // In 3D mode, update three.js colors instead
    if (viewMode === "3d") { updateThreeColors(); return; }

    const rect = canvas.parentElement.getBoundingClientRect();
    const w = rect.width;
    const h = rect.height;
    const dark = isDarkMode();

    // Clear with theme background
    ctx.fillStyle = dark ? "#1a1a1a" : "#F3EDE3";
    ctx.fillRect(0, 0, w, h);

    const hoverSet = getEffectiveHoverHighlightSet();
    const activeHighlight = (hoverSet && hoverSet.size > 0) ? hoverSet
        : (inferHighlightSet && inferHighlightSet.size > 0) ? inferHighlightSet
        : highlightSet;
    const hasHighlight = activeHighlight && activeHighlight.size > 0;

    for (const f of features) {
        // Hide dead features if toggle is on
        if (hideDead && featureLabels[f.i] && featureLabels[f.i].confidence === "dead") continue;

        const [sx, sy] = worldToScreen(f.x, f.y);

        // Skip if off screen
        if (sx < -10 || sx > w + 10 || sy < -10 || sy > h + 10) continue;

        const isHighlighted = hasHighlight && activeHighlight.has(f.i);
        const isSelected = f.i === selectedIdx;

        let r, alpha;
        const logD = Math.log10(Math.max(f.d, 1e-6));
        const t = Math.max(0, Math.min(1, (logD + 5) / 3.5));
        alpha = 0.15 + t * 0.65;
        r = 1.5 + t * 2.5;

        if (isSelected) {
            r = 6;
            ctx.beginPath();
            ctx.arc(sx, sy, r + 3, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(220, 160, 40, 0.25)";
            ctx.fill();
        }

        // Only dim non-highlighted dots for focused highlights (click/infer/search), not hover
        const hasFocusHighlight = (inferHighlightSet && inferHighlightSet.size > 0)
            || (highlightSet && highlightSet.size > 0);
        if (hasFocusHighlight && !isHighlighted && !isSelected) {
            alpha = Math.max(alpha * 0.4, 0.1);
            r = Math.max(r * 0.8, 1.5);
        }

        // Inference-highlighted features get extra emphasis
        if (isHighlighted && inferHighlightSet && inferHighlightSet.size > 0) {
            r = Math.max(r, 5);
        }

        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, Math.PI * 2);

        const isHoverHL = hoverSet && hoverSet.size > 0 && hoverSet.has(f.i);
        const isSidebarHoverHL = sidebarHoverHighlightSet && sidebarHoverHighlightSet.size > 0 && sidebarHoverHighlightSet.has(f.i);
        const isInferHL = inferHighlightSet && inferHighlightSet.size > 0 && inferHighlightSet.has(f.i);
        const isSearchHL = highlightSet && highlightSet.size > 0 && highlightSet.has(f.i);

        if (isSelected) {
            ctx.fillStyle = "rgba(220, 160, 40, 1)";
        } else if (isHoverHL) {
            ctx.fillStyle = featureRainbowCSS(f, Math.min(1, alpha + 0.4));
        } else if (isInferHL || isSearchHL) {
            ctx.fillStyle = `rgba(220, 160, 40, ${Math.min(1, alpha + 0.3)})`;
        } else {
            const lb2d = featureLabels[f.i];
            const isDead2d = lb2d && lb2d.confidence === "dead";
            const hasGoodLabel = lb2d && (lb2d.interp || (lb2d.autointerp && !isDead2d));
            ctx.fillStyle = featureRainbowCSS(f, isDead2d ? alpha * 0.4 : (hasGoodLabel ? Math.min(1, alpha + 0.15) : alpha));
        }
        ctx.fill();

        // Status ring: dead=red, tentative=yellow, unlabeled=white, confident=none
        if (!isSelected && !isHoverHL && !isInferHL && !isSearchHL) {
            const lb = featureLabels[f.i];
            let ringColor = null;
            if (lb && lb.confidence === "dead") {
                ringColor = `rgba(255, 60, 60, ${Math.min(1, alpha + 0.2)})`;
            } else if (lb && lb.confidence === "tentative") {
                ringColor = `rgba(201, 162, 39, ${Math.min(1, alpha + 0.2)})`;
            } else if (!lb || (!lb.interp && !lb.autointerp)) {
                ringColor = `rgba(255, 255, 255, ${Math.min(1, alpha + 0.1)})`;
            }
            // confident = no ring
            if (ringColor) {
                ctx.beginPath();
                ctx.arc(sx, sy, r + 1.5, 0, Math.PI * 2);
                ctx.strokeStyle = ringColor;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        // Ring around inference-highlighted features
        if (isInferHL && !isSelected) {
            ctx.beginPath();
            ctx.arc(sx, sy, r + 2, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(220, 160, 40, 0.6)";
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        // Sidebar hover pulse: expanding white ring that fades out and loops
        if (isSidebarHoverHL && !isSelected) {
            const pulseT = (performance.now() % SIDEBAR_HOVER_PULSE_MS) / SIDEBAR_HOVER_PULSE_MS;
            const pulseRadius = r + 2 + pulseT * 14;
            const pulseAlpha = 0.85 * (1 - pulseT);
            if (pulseAlpha > 0.01) {
                ctx.beginPath();
                ctx.arc(sx, sy, pulseRadius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${pulseAlpha})`;
                ctx.lineWidth = Math.max(0.8, 2.0 - pulseT * 1.2);
                ctx.stroke();
            }
        }
    }

    // Draw neighbor lines from selected feature
    if (selectedIdx !== null && neighborData && neighborData.length > 0) {
        const selFeat = features.find(f => f.i === selectedIdx);
        if (selFeat) {
            const [sx, sy] = worldToScreen(selFeat.x, selFeat.y);
            for (let ni = 0; ni < neighborData.length; ni++) {
                const n = neighborData[ni];
                const [nx, ny] = worldToScreen(n.x, n.y);
                const lineAlpha = 0.15 + n.sim * 0.5;

                ctx.beginPath();
                ctx.moveTo(sx, sy);
                ctx.lineTo(nx, ny);
                ctx.strokeStyle = `rgba(220, 160, 40, ${lineAlpha})`;
                ctx.lineWidth = 1;
                ctx.stroke();

                // Draw neighbor dot bigger
                ctx.beginPath();
                ctx.arc(nx, ny, 4, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(220, 160, 40, 0.7)`;
                ctx.fill();
                ctx.strokeStyle = "rgba(220, 160, 40, 0.9)";
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
    }
}

// === Interaction: Pan & Zoom ===
let isPanning = false;
let panStartX, panStartY;

canvas.addEventListener("mousedown", (e) => {
    if (e.button === 0) {
        isPanning = true;
        panStartX = e.clientX;
        panStartY = e.clientY;
        canvas.style.cursor = "grabbing";
    }
});

window.addEventListener("mousemove", (e) => {
    if (isPanning) {
        const dx = e.clientX - panStartX;
        const dy = e.clientY - panStartY;
        viewX += dx;
        viewY += dy;
        panStartX = e.clientX;
        panStartY = e.clientY;
        draw();
    }
});

window.addEventListener("mouseup", () => {
    isPanning = false;
    canvas.style.cursor = "crosshair";
});

canvas.addEventListener("wheel", (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const factor = e.deltaY > 0 ? 0.9 : 1.1;

    viewX = mx - (mx - viewX) * factor;
    viewY = my - (my - viewY) * factor;
    viewScale *= factor;

    draw();
}, { passive: false });

// === Interaction: Click & Hover ===
let clickStart = null;

canvas.addEventListener("mousedown", (e) => {
    clickStart = { x: e.clientX, y: e.clientY, time: Date.now() };
});

canvas.addEventListener("mouseup", async (e) => {
    if (!clickStart) return;
    const dx = e.clientX - clickStart.x;
    const dy = e.clientY - clickStart.y;
    const dt = Date.now() - clickStart.time;
    clickStart = null;

    // Only count as click if mouse didn't move much and was quick
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5 || dt > 300) return;

    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const closest = findClosest(mx, my, 8);
    if (closest) {
        selectedIdx = closest.i;
        draw();
        await showFeature(closest.i);
    } else {
        // Clicked empty space — deselect everything
        selectedIdx = null;
        neighborData = null;
        highlightSet = null;
        searchResults = null;
        searchInput.value = "";
        searchStatus.textContent = "";
        draw();
    }
});

let canvasHoverIdx = null; // Feature index currently hovered on canvas

canvas.addEventListener("mousemove", (e) => {
    if (isPanning) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const closest = findClosest(mx, my, 8);
    if (closest) {
        tooltip.style.display = "block";
        tooltip.style.left = (e.clientX + 14) + "px";
        tooltip.style.top = (e.clientY + 14) + "px";
        const label = featureLabels[closest.i];
        const interpText = label && label.interp ? label.interp : (label && label.autointerp && label.autointerp !== "dead" ? label.autointerp : "");
        const isTentative = label && label.confidence === "tentative";
        const interpStr = interpText ? `<div class="tt-interp" style="${isTentative ? 'color:#c9a227' : ''}">${isTentative ? '⚠ ' : ''}${escapeHtml(interpText)}</div>` : '';
        tooltip.innerHTML = `<div class="tt-idx">Feature #${closest.i}</div>` +
            interpStr +
            `<div class="tt-stats">density: ${(closest.d * 100).toFixed(2)}% | max: ${closest.mx.toFixed(3)}</div>`;
        canvas.style.cursor = "pointer";

        // Highlight hovered dot (orange) even when something else is selected
        if (canvasHoverIdx !== closest.i) {
            canvasHoverIdx = closest.i;
            hoverHighlightSet = new Set([closest.i]);
            draw();
        }
    } else {
        tooltip.style.display = "none";
        if (!isPanning) canvas.style.cursor = "crosshair";
        if (canvasHoverIdx !== null) {
            canvasHoverIdx = null;
            hoverHighlightSet = null;
            draw();
        }
    }
});

canvas.addEventListener("mouseleave", () => {
    tooltip.style.display = "none";
    if (canvasHoverIdx !== null) {
        canvasHoverIdx = null;
        hoverHighlightSet = null;
        draw();
    }
});

function findClosest(sx, sy, maxDist) {
    let best = null, bestDist = Infinity;
    for (const f of features) {
        const [fx, fy] = worldToScreen(f.x, f.y);
        const d = Math.hypot(sx - fx, sy - fy);
        if (d < bestDist && d < maxDist) {
            best = f;
            bestDist = d;
        }
    }
    return best;
}

// === Sidebar ===
let neighborData = null; // [{i, sim, x, y}, ...]

async function showFeature(idx) {
    sidebar.classList.remove("collapsed");
    sidebarBody.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading...</div>';

    // Clear old neighbors immediately so stale lines don't show
    neighborData = null;
    updateThreeNeighborLines();
    draw();

    try {
        // Fetch all three in parallel
        const [featureResp, neighborsResp, tokensResp] = await Promise.all([
            fetch(`/api/feature/${idx}`),
            fetch(`/api/neighbors/${idx}`),
            fetch(`/api/top_tokens/${idx}`),
        ]);
        const data = await featureResp.json();
        const nbrs = await neighborsResp.json();
        const toks = await tokensResp.json();

        neighborData = nbrs.neighbors || [];
        updateThreeNeighborLines();
        draw(); // redraw with neighbor lines

        renderFeature(data, toks.tokens || [], neighborData);
    } catch (e) {
        sidebarBody.innerHTML = `<div class="loading">Error: ${e.message}</div>`;
    }
}

// Ring texture for labeled features (created once, reused)
// Ring textures cached per color (see _ringTexCache)
const _ringTexCache = {};
function getRingTexture(color) {
    if (_ringTexCache[color]) return _ringTexCache[color];
    const sz = 64;
    const c = document.createElement("canvas");
    c.width = sz; c.height = sz;
    const ctx = c.getContext("2d");
    ctx.clearRect(0, 0, sz, sz);
    ctx.beginPath();
    ctx.arc(sz/2, sz/2, sz/2 - 4, 0, Math.PI * 2);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();
    _ringTexCache[color] = new THREE.CanvasTexture(c);
    return _ringTexCache[color];
}

function getFeatureRingColor(featureIdx) {
    // dead=red, tentative=yellow, unlabeled=white, confident=null (no ring)
    const lb = featureLabels[featureIdx];
    if (lb && lb.confidence === "dead") return "rgba(255, 60, 60, 0.7)";
    if (lb && lb.confidence === "tentative") return "rgba(201, 162, 39, 0.7)";
    if (!lb || (!lb.interp && !lb.autointerp)) return "rgba(255, 255, 255, 0.4)";
    return null; // confident — no ring
}

function updateThreeLabelRings() {
    if (!threeScene || !threePoints) return;
    // Remove old rings
    const oldGroup = threeScene.getObjectByName("labelRings");
    if (oldGroup) threeScene.remove(oldGroup);

    const pos = threePoints.geometry.attributes.position.array;
    const group = new THREE.Group();
    group.name = "labelRings";

    for (let i = 0; i < features.length; i++) {
        const f = features[i];
        if (hideDead && featureLabels[f.i] && featureLabels[f.i].confidence === "dead") continue;
        const ringColor = getFeatureRingColor(f.i);
        if (!ringColor) continue;

        const mat = new THREE.SpriteMaterial({
            map: getRingTexture(ringColor),
            transparent: true,
            depthWrite: false,
            depthTest: true,
        });
        const sprite = new THREE.Sprite(mat);
        sprite.position.set(pos[i*3], pos[i*3+1], pos[i*3+2]);
        sprite.userData.featureIdx = f.i;
        group.add(sprite);
    }
    threeScene.add(group);
}

// Update 3D neighbor lines (no-op in 2D mode)
function updateThreeNeighborLines() {
    if (viewMode !== "3d" || !threeScene) return;

    // Remove old lines
    const old = threeScene.getObjectByName("neighborLines");
    if (old) threeScene.remove(old);
    const oldGlow = threeScene.getObjectByName("selectedGlow");
    if (oldGlow) threeScene.remove(oldGlow);

    if (selectedIdx === null || !neighborData || neighborData.length === 0) return;

    const positions = threePoints.geometry.attributes.position.array;

    // Find selected feature's array index
    const selArrayIdx = features.findIndex(f => f.i === selectedIdx);
    if (selArrayIdx < 0) return;
    const sx = positions[selArrayIdx * 3];
    const sy = positions[selArrayIdx * 3 + 1];
    const sz = positions[selArrayIdx * 3 + 2];

    // Build line geometry
    const linePositions = [];
    const lineColors = [];
    for (const n of neighborData) {
        const nArrayIdx = features.findIndex(f => f.i === n.i);
        if (nArrayIdx < 0) continue;
        const nx = positions[nArrayIdx * 3];
        const ny = positions[nArrayIdx * 3 + 1];
        const nz = positions[nArrayIdx * 3 + 2];

        linePositions.push(sx, sy, sz, nx, ny, nz);
        const alpha = 0.4 + n.sim * 0.6;
        lineColors.push(0.5 * alpha, 0.6 * alpha, 0.8 * alpha, 0.5 * alpha, 0.6 * alpha, 0.8 * alpha);
    }

    if (linePositions.length > 0) {
        const lineGeo = new THREE.BufferGeometry();
        lineGeo.setAttribute("position", new THREE.Float32BufferAttribute(linePositions, 3));
        lineGeo.setAttribute("color", new THREE.Float32BufferAttribute(lineColors, 3));
        const lineMat = new THREE.LineBasicMaterial({
            vertexColors: true,
            transparent: true,
            opacity: 0.5,
            depthTest: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
        });
        const lines = new THREE.LineSegments(lineGeo, lineMat);
        lines.name = "neighborLines";
        threeScene.add(lines);
    }

}

function renderFeature(data, topTokens, neighbors) {
    // Clear stale sidebar-hover pulse when loading a new feature panel
    setSidebarHoverFeature(null);

    const label = featureLabels[data.feature_idx] || {};
    const interpVal = label.interp || "";
    let html = "";

    // Back to Combined button when drilling in from combined view
    if (_combinedViewState) {
        html += `<button id="back-to-combined" class="infer-toggle" style="margin-bottom:8px;background:var(--bg-secondary);border-color:var(--border);font-size:11px;padding:4px 10px">← Combined</button>`;
    }

    html += `<div class="feature-title">Feature <span class="idx">#${data.feature_idx}</span></div>`;

    // Editable interpretation field
    html += `<div class="interp-box">
        <input type="text" class="interp-input" id="interp-input" value="${escapeHtml(interpVal)}" placeholder="Label this feature..." data-feature="${data.feature_idx}">
        <button class="interp-save" id="interp-save">Save</button>
    </div>`;

    // Autointerp label (shown below human label box)
    if (label.autointerp && label.autointerp !== "dead") {
        const isTentative = label.confidence === "tentative";
        const badgeColor = isTentative ? "#c9a227" : "#4a9eff";
        const badgeText = isTentative ? "tentative" : "auto";
        html += `<div style="margin:4px 0 8px;font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:6px">
            <span style="background:${badgeColor};color:#000;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;text-transform:uppercase">${badgeText}</span>
            <span style="font-style:italic;${isTentative ? 'color:#c9a227' : ''}">${escapeHtml(label.autointerp)}</span>
        </div>`;
    }

    // Positional warning
    if (data.position_info && data.position_info.is_positional) {
        html += `<div style="background:#FFF3CD;border:1px solid #E0C97A;border-radius:6px;padding:8px 12px;margin:8px 0;font-size:12px;color:#856404">
            Positional feature: fires at position ${data.position_info.top_position} in chunk (${(data.position_info.concentration * 100).toFixed(0)}% concentration)
        </div>`;
    }

    html += `<div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Density</div>
            <div class="stat-value">${(data.density * 100).toFixed(3)}%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Max Activation</div>
            <div class="stat-value">${data.max_act.toFixed(4)}</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Mean Activation</div>
            <div class="stat-value">${data.mean_act.toFixed(4)}</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Fire Count</div>
            <div class="stat-value">${data.fire_count.toLocaleString()}</div>
        </div>
    </div>`;

    // Top tokens
    if (topTokens.length > 0) {
        html += `<div class="examples-header">Top Activating Tokens</div>`;
        html += `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px">`;
        for (const tok of topTokens.slice(0, 20)) {
            const text = displayToken(tok.text);
            html += `<span style="display:inline-block;background:rgba(139,157,131,${Math.min(0.6, tok.mean_act * 0.3)});border:1px solid rgba(139,157,131,0.3);border-radius:4px;padding:2px 6px;font-family:var(--mono);font-size:11px;white-space:pre" title="count: ${tok.count}, mean act: ${tok.mean_act}">${escapeHtml(text)}<span style="font-size:9px;opacity:0.6;margin-left:3px">${tok.count}</span></span>`;
        }
        html += `</div>`;
    }

    // Neighbors
    if (neighbors.length > 0) {
        html += `<div class="examples-header">Most Similar Features</div>`;
        html += `<div style="margin-bottom:12px">`;
        for (const n of neighbors.slice(0, 10)) {
            html += `<div class="search-result-item" data-idx="${n.i}" style="padding:4px 8px">
                <span class="feat-idx">#${n.i}${interpTag(n.i)}</span>
                <div class="feat-bar"><div class="feat-bar-fill" style="width:${(n.sim * 100).toFixed(0)}%"></div></div>
                <span class="feat-score">${n.sim.toFixed(3)}</span>
            </div>`;
        }
        html += `</div>`;
    }

    // Examples
    html += `<div class="examples-header">Top Activating Examples (${data.examples.length})</div>`;

    for (const ex of data.examples) {
        html += `<div class="example">`;
        html += `<div class="peak">peak: ${ex.peak_activation.toFixed(3)}</div>`;
        for (const span of ex.spans) {
            if (span.a > 0.1) {
                const intensity = Math.min(1, span.a / 10);
                const bgAlpha = 0.1 + intensity * 0.5;
                html += `<span class="tok hot" style="--intensity:${bgAlpha}" title="act: ${span.a}">${escapeHtml(span.t)}</span>`;
            } else {
                html += `<span class="tok">${escapeHtml(span.t)}</span>`;
            }
        }
        html += `</div>`;
    }

    if (data.examples.length === 0) {
        html += `<div class="loading">No examples found for this feature.</div>`;
    }

    sidebarBody.innerHTML = html;

    // Click handlers on neighbor items
    for (const el of sidebarBody.querySelectorAll(".search-result-item")) {
        el.addEventListener("mouseenter", () => {
            const nIdx = parseInt(el.dataset.idx);
            if (Number.isInteger(nIdx)) setSidebarHoverFeature(nIdx);
        });
        el.addEventListener("mouseleave", () => {
            setSidebarHoverFeature(null);
        });
        el.addEventListener("click", async () => {
            setSidebarHoverFeature(null);
            const nIdx = parseInt(el.dataset.idx);
            selectedIdx = nIdx;
            draw();
            await showFeature(nIdx);
        });
    }

    // Interp save handler
    const interpInput = document.getElementById("interp-input");
    const interpSave = document.getElementById("interp-save");
    if (interpInput && interpSave) {
        const saveInterp = async () => {
            const featIdx = parseInt(interpInput.dataset.feature);
            const val = interpInput.value.trim();
            interpSave.textContent = "...";
            interpSave.disabled = true;
            try {
                await fetch(`/api/label/${featIdx}`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({interp: val}),
                });
                // Update local cache
                if (!featureLabels[featIdx]) featureLabels[featIdx] = {interp: "", autointerp: ""};
                featureLabels[featIdx].interp = val;
                if (viewMode === "3d") updateThreeLabelRings();
                // Refresh proximity label if it exists
                if (_proxLabelEls[featIdx]) {
                    _proxLabelEls[featIdx].remove();
                    delete _proxLabelEls[featIdx];
                }
                interpSave.textContent = "Saved";
                setTimeout(() => { interpSave.textContent = "Save"; interpSave.disabled = false; }, 800);
            } catch (e) {
                interpSave.textContent = "Error";
                setTimeout(() => { interpSave.textContent = "Save"; interpSave.disabled = false; }, 1500);
            }
        };
        interpSave.addEventListener("click", saveInterp);
        interpInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") saveInterp();
        });
    }

    // Back to Combined button handler
    const backBtn = document.getElementById("back-to-combined");
    if (backBtn && _combinedViewState) {
        backBtn.addEventListener("click", () => {
            const state = _combinedViewState;
            _combinedViewState = null;
            selectedIdx = null;
            neighborData = null;
            updateThreeNeighborLines();
            inferHighlightSet = state.highlightSet;
            sidebarBody.innerHTML = state.html;
            state.reattach();
            draw();
        });
    }
}

function escapeHtml(s) {
    if (!s) return "";
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function displayToken(s) {
    if (!s || s.length === 0) return '\u2423';
    return s;
}

function interpTag(featureIdx) {
    // Returns HTML snippet for the interp label (human > autointerp fallback)
    const label = featureLabels[featureIdx];
    if (label && label.interp) return ` <span style="font-weight:700;font-style:italic;color:var(--accent);font-size:inherit">${escapeHtml(label.interp)}</span>`;
    if (label && label.autointerp && label.autointerp !== "dead") {
        const color = label.confidence === "tentative" ? "#c9a227" : "var(--text-dim)";
        return ` <span style="font-style:italic;color:${color};font-size:inherit">${escapeHtml(label.autointerp)}</span>`;
    }
    return '';
}
function getEffectiveLabel(featureIdx) {
    // Returns the best available label text for a feature
    const label = featureLabels[featureIdx];
    if (!label) return "";
    return label.interp || label.autointerp || "";
}

document.getElementById("sidebar-close").addEventListener("click", () => {
    setSidebarHoverFeature(null);
    sidebar.classList.add("collapsed");
    selectedIdx = null;
    neighborData = null;
    _combinedViewState = null;
    activeInferTok = null;
    inferHighlightSet = null;
    inferTokensEl.querySelectorAll(".infer-tok").forEach(el => el.classList.remove("active"));
    draw();
});

// === Search ===
let searchTimeout = null;

searchInput.addEventListener("input", () => {
    clearTimeout(searchTimeout);
    const q = searchInput.value.trim();

    // Direct feature lookup by ID: type a number like "554" or "#554"
    const idMatch = q.match(/^#?(\d+)$/);
    if (idMatch) {
        const fIdx = parseInt(idMatch[1]);
        if (fIdx >= 0 && fIdx < features.length) {
            searchStatus.textContent = `Feature #${fIdx}`;
            highlightSet = new Set([fIdx]);
            draw();
            showFeature(fIdx);
            return;
        }
    }

    // Special filters: :tentative, :unlabeled, :confident, :dead
    if (q.startsWith(":")) {
        const filter = q.slice(1).toLowerCase();
        const matches = [];
        for (const f of features) {
            const lb = featureLabels[f.i];
            if (!lb) { if (filter === "unlabeled") matches.push(f.i); continue; }
            if (filter === "tentative" && lb.confidence === "tentative") matches.push(f.i);
            else if (filter === "unlabeled" && !lb.interp && !lb.autointerp) matches.push(f.i);
            else if (filter === "confident" && lb.confidence === "confident" && !lb.interp) matches.push(f.i);
            else if (filter === "dead" && lb.confidence === "dead") matches.push(f.i);
        }
        if (matches.length > 0) {
            highlightSet = new Set(matches);
            searchResults = null;
            searchStatus.textContent = `${matches.length} ${filter} features`;
            draw();
            // Show first one
            showFeature(matches[0]);
        } else {
            searchStatus.textContent = `0 ${filter} features`;
            highlightSet = null;
            draw();
        }
        return;
    }

    // Label search: match against interp + autointerp text
    if (q.length >= 2) {
        const qLower = q.toLowerCase();
        const labelMatches = [];
        for (const f of features) {
            const lb = featureLabels[f.i];
            if (!lb) continue;
            const text = ((lb.interp || "") + " " + (lb.autointerp || "")).toLowerCase();
            if (text.includes(qLower)) labelMatches.push(f.i);
        }
        if (labelMatches.length > 0) {
            highlightSet = new Set(labelMatches);
            searchResults = null;
            searchStatus.textContent = `${labelMatches.length} label matches for "${q}"`;
            draw();
            return;
        }
    }

    if (q.length < 2) {
        highlightSet = null;
        searchResults = null;
        searchStatus.textContent = "";
        draw();
        return;
    }

    searchTimeout = setTimeout(async () => {
        try {
            searchStatus.textContent = "Searching...";
            const resp = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
            const data = await resp.json();

            if (data.features && data.features.length > 0) {
                highlightSet = new Set(data.features.map(f => f.i));
                searchResults = data.features;
                searchStatus.textContent = `${data.n_matching_tokens} tokens, ${data.features.length} features`;
                draw();
                showSearchResults(data);
            } else {
                highlightSet = null;
                searchResults = null;
                searchStatus.textContent = "No matches";
                draw();
            }
        } catch (e) {

function stopSidebarHoverPulseLoop() {

function runSidebarHoverPulseLoop() {
    if (!sidebarHoverHighlightSet || sidebarHoverHighlightSet.size === 0 || viewMode !== "2d") {
        sidebarPulseRaf = null;
        return;
    }
    draw();
    sidebarPulseRaf = requestAnimationFrame(runSidebarHoverPulseLoop);
}

function setSidebarHoverFeature(featureIdx) {
    const nextIdx = Number.isInteger(featureIdx) ? featureIdx : null;
    const prevIdx = (sidebarHoverHighlightSet && sidebarHoverHighlightSet.size > 0)
        ? sidebarHoverHighlightSet.values().next().value
        : null;
    if (prevIdx === nextIdx) return;

    sidebarHoverHighlightSet = nextIdx === null ? null : new Set([nextIdx]);

    if (sidebarHoverHighlightSet && viewMode === "2d") {
        if (sidebarPulseRaf === null) {
            sidebarPulseRaf = requestAnimationFrame(runSidebarHoverPulseLoop);
        }
    } else {
        stopSidebarHoverPulseLoop();
    }

    if (viewMode === "3d") updateThreeColors();
